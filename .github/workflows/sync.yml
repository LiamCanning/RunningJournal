name: Strava Sync

on:
  schedule:
    - cron: '15 * * * *'   # every hour at :15 past
  workflow_dispatch:         # allow manual trigger from GitHub UI

# Queue overlapping runs instead of racing on the push to main.
concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to commit dashboard back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Run sync (3x retry on transient Strava/network errors)
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          ok=0
          for i in 1 2 3; do
            if python3 automation/ci_sync.py; then ok=1; break; fi
            echo "Strava sync attempt $i failed (likely transient Strava 403 / network); retrying in 30s..."
            sleep 30
          done
          [ "$ok" = "1" ]

      - name: Commit & push (explicit token, 3x retry)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "strava-sync[bot]"
          git config user.email "strava-sync[bot]@users.noreply.github.com"
          # Embed the token in the remote so the push never depends on the
          # credential helper (was the cause of "could not read Username").
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add index.html classified_runs.csv strava_activity_cache.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "Auto-sync $(date -u '+%Y-%m-%d %H:%M') UTC"
          ok=0
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then ok=1; break; fi
            echo "push attempt $i failed (transient auth/network); retrying in 15s..."
            sleep 15
          done
          [ "$ok" = "1" ]

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"C0B3VDBP9LG\",\"text\":\"*Strava sync failed after 3 retries* :x: Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
