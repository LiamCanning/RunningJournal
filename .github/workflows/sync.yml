name: Strava Sync

on:
  schedule:
    - cron: '15 * * * *'   # every hour at :15 past
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to commit dashboard back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Run sync
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python3 automation/ci_sync.py

      - name: Commit & push
        run: |
          git config user.name  "strava-sync[bot]"
          git config user.email "strava-sync[bot]@users.noreply.github.com"
          git add index.html classified_runs.csv strava_activity_cache.json
          if git diff --cached --quiet; then
            echo "Nothing new."
          else
            git commit -m "Auto-sync $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push || (sleep 15 && git pull --rebase origin main && git push)
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"C0B3VDBP9LG\",\"text\":\"*Strava sync failed* :x: Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
