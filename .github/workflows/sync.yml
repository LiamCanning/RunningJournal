name: Activity Sync (intervals.icu)

on:
  schedule:
    - cron: '15,45 * * * *'   # every 30 min (public repo - Actions minutes are free)
  workflow_dispatch:         # allow manual trigger from GitHub UI

# Queue overlapping runs instead of racing on the push to main.
concurrency:
  group: activity-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Uses GH_PAT (set 2026-05-26) rather than GITHUB_TOKEN so pushes trigger
    # the pages-build-deployment workflow. If runs suddenly fail at checkout,
    # the PAT has expired — regenerate at github.com/settings/tokens.
    permissions:
      contents: write        # to commit dashboard back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync (3x retry on transient network errors)
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          ok=0
          for i in 1 2 3; do
            if python3 automation/ci_sync.py; then ok=1; break; fi
            echo "sync attempt $i failed (likely transient network); retrying in 30s..."
            sleep 30
          done
          [ "$ok" = "1" ]

      - name: Commit & push (explicit token, 3x retry)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name  "strava-sync[bot]"
          git config user.email "strava-sync[bot]@users.noreply.github.com"
          # Embed the token in the remote so the push never depends on the
          # credential helper (was the cause of "could not read Username").
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add index.html classified_runs.csv strava_activity_cache.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "Auto-sync $(date -u '+%Y-%m-%d %H:%M') UTC"
          ok=0
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then ok=1; break; fi
            echo "push attempt $i failed (transient auth/network); retrying in 15s..."
            sleep 15
          done
          [ "$ok" = "1" ]

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          resp=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"C0B3VDBP9LG\",\"text\":\"*intervals.icu sync failed after 3 retries* :x: Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}")
          # Fail the step if Slack rejected the message, so a dead token or
          # missing channel is visible as a red X instead of a silent no-op.
          echo "$resp" | grep -q '"ok":true' || { echo "Slack alert delivery failed: $resp"; exit 1; }
