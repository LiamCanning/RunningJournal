<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liam's Running Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fc;--bg2:#eef0f7;--card:#fff;--card2:#f8f9fd;--card3:#f1f2f8;
  --bdr:#dfe2ee;--bdr2:#c8cce0;
  --t1:#1a1d2e;--t2:#4b4f6a;--t3:#8088a8;
  --grn:#0d8c54;--grn2:#0a7646;--grnGlow:rgba(13,140,84,.1);--grnSoft:rgba(13,140,84,.05);
  --org:#c06c1c;--orgGlow:rgba(192,108,28,.08);
  --red:#d32828;--redGlow:rgba(211,40,40,.06);
  --blu:#1e6cc0;--bluGlow:rgba(30,108,192,.08);
  --prp:#6a4ec8;
  --accent:var(--grn);
  --grd1:linear-gradient(135deg,#0d8c54 0%,#0a7646 100%);
  --grd2:linear-gradient(135deg,#c06c1c 0%,#a05a14 100%);
  --grd3:linear-gradient(135deg,#1e6cc0 0%,#1558a8 100%);
  --shadow:0 1px 4px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadowL:0 4px 20px rgba(0,0,0,.07);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--t1);background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}

/* LAYOUT - sidebar shell */
.shell{display:flex;min-height:100vh;background:var(--bg)}
.main-wrap{flex:1;min-width:0;padding:28px 36px 80px}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:var(--card);border-right:1px solid var(--bdr);z-index:50;overflow-y:auto}
.sidebar-brand{padding:22px 18px 16px;border-bottom:1px solid var(--bdr)}
.sidebar-title{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-.3px;line-height:1.2}
.sidebar-race{font-size:11px;color:var(--t3);font-weight:600;margin-top:3px}
.sidebar-cd{margin-top:12px;padding:10px 12px;background:var(--grnSoft);border-radius:10px;border:1px solid rgba(13,140,84,.15)}
.sidebar-cd-n{font-size:30px;font-weight:800;color:var(--grn);font-family:'JetBrains Mono',monospace;line-height:1}
.sidebar-cd-l{font-size:11px;color:var(--grn);font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-top:2px}
.sidebar-nav{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.nav-btn{font-family:'Inter';font-size:13px;font-weight:600;padding:9px 12px;cursor:pointer;border:none;background:transparent;color:var(--t3);border-radius:10px;transition:all .18s;white-space:nowrap;text-align:left;width:100%;position:relative}
.nav-btn:hover{color:var(--t2);background:var(--bg2)}
.nav-btn.on{color:var(--grn);background:var(--grnSoft);font-weight:700}
.nav-btn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--grn);border-radius:0 2px 2px 0}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--bdr);font-size:12px;color:var(--t3);font-weight:500;line-height:1.5}
.nb-icon{display:none;font-size:18px;line-height:1}
.nb-label{display:block}
.page{display:none;opacity:0;transition:opacity .25s ease}.page.show{display:block}.page.show.visible{opacity:1}

/* VOLUME HOVER TOOLTIP */
.vol-tip{position:fixed;background:var(--t1);color:#fff;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;pointer-events:none;z-index:500;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);transform:translateY(-4px)}
.vol-tip.show{opacity:1;transform:translateY(0)}

/* CARDS & GRIDS */
.sec{margin-top:32px}
.sec-h{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--bdr)}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
/* responsive rules consolidated below */

/* STAT CARDS */
.st{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;transition:all .2s;position:relative;overflow:hidden}
.st:hover{border-color:var(--bdr2);transform:translateY(-1px);box-shadow:var(--shadow)}
.st.a{border-color:var(--grn);background:var(--grnSoft)}
.st.a::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--grd1);border-radius:3px 0 0 3px}
.st.w{border-color:var(--org);background:var(--orgGlow)}
.st.w::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--grd2);border-radius:3px 0 0 3px}
.sl{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700}
.sv{font-family:'JetBrains Mono';font-size:28px;font-weight:700;margin-top:6px;line-height:1}
.st.a .sv{color:var(--grn)}.st.w .sv{color:var(--org)}
.sd{font-size:13px;color:var(--t3);margin-top:6px;font-weight:500}

/* PB CARDS */
.pb{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:all .2s}
.pb:hover{border-color:var(--grn);transform:translateY(-1px);box-shadow:var(--shadow)}
.pb::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--grd1)}
.pb .pv{font-family:'JetBrains Mono';font-size:26px;font-weight:700;margin:8px 0 4px;line-height:1}
.pb .pp{font-size:12px;color:var(--grn);font-weight:700}

/* MONTHLY BARS */
.bars{display:flex;align-items:flex-end;gap:2px;height:180px;padding:8px 0 28px;position:relative}
.bars::after{content:'';position:absolute;bottom:28px;left:0;right:0;height:1px;background:var(--bdr)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.bar-fill{border-radius:4px 4px 0 0;min-height:2px;width:100%;transition:height .4s ease}
.bar-lbl{font-size:9px;color:var(--t3);margin-top:6px;text-align:center;white-space:nowrap;font-weight:600}
.bar-val{position:absolute;top:-18px;font-size:10px;color:var(--t2);font-family:'JetBrains Mono';font-weight:600;opacity:0;transition:opacity .15s}
.bar-col:hover .bar-val{opacity:1}
.bar-col:hover .bar-fill{opacity:1 !important}

/* WEEKLY VOLUME */
.wk-grid{display:flex;gap:3px;align-items:flex-end;overflow-x:auto;padding-bottom:4px}
.wk-col{flex:1;min-width:48px;display:flex;flex-direction:column;align-items:center;text-align:center}
.wk-val{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.wk-bar-wrap{width:100%;height:120px;display:flex;align-items:flex-end;justify-content:center}
.wk-bar{width:100%;border-radius:5px 5px 0 0;background:var(--grd1);opacity:.55;transition:all .2s;min-height:3px}
.wk-col:hover .wk-bar{opacity:1}
.wk-runs{font-size:10px;color:var(--t3);margin-top:4px;font-weight:600}
.wk-delta{font-size:11px;font-weight:700;margin-top:2px;min-height:14px}
.wk-delta.up{color:var(--grn)}.wk-delta.dn{color:var(--red)}
.wk-lbl{font-size:11px;font-weight:700;color:var(--t3);margin-top:2px}
.wk-date{font-size:9px;color:var(--t3);opacity:.7}
/* responsive rules consolidated below */

/* INTENSITY BAR */
.int-bar{display:flex;height:32px;border-radius:10px;overflow:hidden;gap:2px}
.int-leg{display:flex;gap:24px;margin-top:12px;font-size:12px;font-weight:600}
.int-leg span{display:flex;align-items:center;gap:8px}
.int-leg .dot{width:10px;height:10px;border-radius:4px}

/* 2026 ANNUAL GOALS CARD */
.ann-goals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.ann-goal{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ann-goal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.ann-goal.g-5k::before{background:var(--grn)}
.ann-goal.g-10k::before{background:var(--blu)}
.ann-goal.g-mar::before{background:var(--red)}
.ann-goal-dist{font-family:'JetBrains Mono';font-size:10px;font-weight:800;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.ann-goal-target{font-family:'JetBrains Mono';font-size:22px;font-weight:800;color:var(--t1);line-height:1;margin-bottom:10px}
.ann-goal-prog-track{height:5px;background:var(--card2);border-radius:3px;margin-bottom:12px;overflow:hidden}
.ann-goal-prog-fill{height:100%;border-radius:3px;transition:width .8s ease}
.g-5k .ann-goal-prog-fill{background:var(--grn)}
.g-10k .ann-goal-prog-fill{background:var(--blu)}
.g-mar .ann-goal-prog-fill{background:var(--red)}
.ann-goal-current{font-family:'JetBrains Mono';font-size:15px;font-weight:700;color:var(--t2)}
.ann-goal-date{font-size:11px;color:var(--t3);margin-top:2px;margin-bottom:10px}
.ann-goal-unraced{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:10px}
.ann-goal-note{font-size:12px;color:var(--t2);line-height:1.45;padding:9px 11px;background:var(--bg2);border-radius:8px;font-style:italic;margin-top:auto}
@media(max-width:768px){.ann-goals{grid-template-columns:1fr}}

/* FORM METRICS */
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
.fc .fv{font-family:'JetBrains Mono';font-size:26px;font-weight:700;margin-top:6px}
.fc .trend{font-size:12px;font-weight:700;margin-top:6px}
.fc .trend.up{color:var(--grn)}.fc .trend.dn{color:var(--red)}

/* RACE/INT DISTANCE TABS */
.dtabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--bdr)}
.dtab{font-family:'Inter';font-size:12px;font-weight:700;padding:8px 16px;cursor:pointer;border:none;background:transparent;color:var(--t3);border-radius:6px;transition:all .15s}
.dtab.on{background:var(--card2);color:var(--t1);box-shadow:var(--shadow)}
.dtab:hover:not(.on){background:var(--card2);color:var(--t2)}

/* RACE CARDS */
.rc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:all .2s;border-left:4px solid var(--bdr)}
.rc:hover{border-color:var(--bdr2);box-shadow:var(--shadow)}
.rc:hover{border-left-color:inherit}
.rc.cat-5k{border-left-color:#0d8c54}
.rc.cat-10k{border-left-color:#1e6cc0}
.rc.cat-15k{border-left-color:#6a4ec8}
.rc.cat-21k{border-left-color:#c06c1c}
.rc.cat-42k{border-left-color:#d32828}
.rc.best{border-color:var(--grn);border-left-color:var(--grn);background:linear-gradient(135deg,rgba(13,140,84,.03) 0%,var(--card) 60%)}
.rc.best::before{content:'';display:block;height:3px;background:var(--grd1)}
.rc-head{padding:18px 22px;cursor:pointer;-webkit-user-select:none;user-select:none}
.rc-top{display:flex;justify-content:space-between;align-items:center}
.rc-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.badge{background:var(--grd1);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px}
.rc-dist-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:0.8px;text-transform:uppercase}
.rc-dist-chip.d5k{background:rgba(13,140,84,.1);color:#0d8c54}
.rc-dist-chip.d10k{background:rgba(30,108,192,.1);color:#1e6cc0}
.rc-dist-chip.d15k{background:rgba(106,78,200,.1);color:#6a4ec8}
.rc-dist-chip.d21k{background:rgba(192,108,28,.1);color:#c06c1c}
.rc-dist-chip.d42k{background:rgba(211,40,40,.1);color:#d32828}
.rc-date{font-size:12px;color:var(--t3);font-weight:500}
.rc-stats{display:flex;gap:28px;margin-top:12px;flex-wrap:wrap;align-items:flex-end}
.mn{display:flex;flex-direction:column;gap:2px}
.mnl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-weight:700}
.mnv{font-family:'JetBrains Mono';font-size:16px;font-weight:700}
.mnv.hl{color:var(--grn)}
.rc-spark{display:flex;align-items:flex-end;gap:1px;height:24px;margin-left:auto}
.rc-spark-bar{width:4px;border-radius:2px 2px 0 0;min-height:3px;transition:height .3s}
.rc-body{display:none;padding:0 22px 20px;border-top:1px solid var(--bdr)}
.rc.open .rc-body{display:block}
.rc-chevron{color:var(--t3);transition:transform .2s;font-size:18px}
.rc.open .rc-chevron{transform:rotate(180deg)}

/* SPLITS */
.splits{margin-top:16px}
.splits-h{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin-bottom:10px}
.split-row{display:flex;align-items:center;gap:0;margin-bottom:4px}
.split-km{font-size:13px;font-weight:600;min-width:44px;color:var(--t3);font-family:'JetBrains Mono'}
.split-bar{height:26px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:#fff;min-width:44px;transition:width .4s ease}
.split-fast{background:var(--grd1) !important;opacity:1 !important}
.split-avg{background:var(--grn);opacity:.4}
.split-slow{background:var(--org);opacity:.7}

/* PROGRESSION */
.prog{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-top:20px}
.prog-bars{display:flex;align-items:flex-end;gap:14px;height:140px}
.prog-item{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.prog-val{font-family:'JetBrains Mono';font-size:11px;font-weight:700;margin-bottom:6px}
.prog-bar{width:100%;max-width:56px;border-radius:8px 8px 0 0;transition:height .4s}
.prog-lbl{font-size:11px;color:var(--t3);margin-top:8px;text-align:center;line-height:1.2;font-weight:500}
.empty{padding:60px;text-align:center;color:var(--t3);font-size:15px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;font-weight:500}

/* RACE CALENDAR */
.cal-hero{background:linear-gradient(135deg,var(--grn) 0%,#0a6b40 100%);color:#fff;border-radius:18px;padding:26px 30px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;position:relative;overflow:hidden}
.cal-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);pointer-events:none}
.cal-hero-l{flex:1;min-width:220px;position:relative;z-index:1}
.cal-hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;opacity:.75;font-weight:700;margin-bottom:6px}
.cal-hero-name{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.cal-hero-meta{font-size:13px;opacity:.85;font-weight:500}
.cal-hero-r{text-align:right;position:relative;z-index:1}
.cal-hero-cd{font-family:'JetBrains Mono';font-size:52px;font-weight:800;line-height:1;letter-spacing:-2px}
.cal-hero-cdlbl{font-size:13px;text-transform:uppercase;letter-spacing:2px;opacity:.8;margin-top:4px;font-weight:700}
.cal-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.cal-filter-group{display:flex;gap:4px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:4px}
.cal-filter-lbl{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700;margin-right:6px}
.cal-chip{font-family:'Inter';font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;border:none;background:transparent;color:var(--t3);border-radius:6px;transition:all .15s;white-space:nowrap}
.cal-chip:hover{color:var(--t1)}
.cal-chip.on{background:var(--card2);color:var(--t1);box-shadow:var(--shadow)}
.cal-section-h{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);font-weight:700;margin:28px 0 12px;display:flex;align-items:center;gap:10px}
.cal-section-h .cal-count{background:var(--card2);color:var(--t2);font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.cal-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px 20px;transition:all .18s;position:relative;display:flex;flex-direction:column;gap:12px}
.cal-card:hover{border-color:var(--bdr2);transform:translateY(-1px);box-shadow:var(--shadowL)}
.cal-card.confirmed{border-left:4px solid var(--grn)}
.cal-card.possibility{border-left:4px solid var(--org)}
.cal-card.bucket{border-left:4px solid var(--blu)}
.cal-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cal-card-dateline{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono';font-size:12px;font-weight:700;color:var(--t2)}
.cal-card-date{color:var(--t1)}
.cal-card-cd{background:var(--grnSoft);color:var(--grn);font-size:10px;font-weight:800;padding:3px 9px;border-radius:10px;letter-spacing:.3px;white-space:nowrap}
.cal-card-cd.soon{background:#fff3e5;color:var(--org)}
.cal-card-cd.imminent{background:#ffe5e5;color:var(--red);animation:pulse 1.6s ease-in-out infinite}
.cal-card-cd.past{background:var(--card2);color:var(--t3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.cal-card-dist{font-size:10px;font-weight:800;background:var(--card2);color:var(--t1);padding:4px 10px;border-radius:6px;letter-spacing:1px;white-space:nowrap}
.cal-card-dist.marathon{background:linear-gradient(135deg,var(--red),#c43030);color:#fff}
.cal-card-dist.half{background:linear-gradient(135deg,var(--blu),#1a5cad);color:#fff}
.cal-card-dist.tenK{background:linear-gradient(135deg,var(--org),#c27020);color:#fff}
.cal-card-dist.fiveK{background:linear-gradient(135deg,var(--grn),#0a6b40);color:#fff}
.cal-card-dist.fifteenK{background:linear-gradient(135deg,#6b3fa0,#4a2a75);color:#fff}
.cal-card-name{font-size:15px;font-weight:700;color:var(--t1);line-height:1.3}
.cal-card-loc{font-size:12px;color:var(--t3);font-weight:500;display:flex;align-items:center;gap:6px}
.cal-card-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:auto;padding-top:10px;border-top:1px solid var(--bdr)}
.cal-card-tag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.cal-card-tag.registered{background:var(--grnSoft);color:var(--grn)}
.cal-card-tag.possibility{background:#fff3e5;color:var(--org)}
.cal-card-tag.reg-open{background:var(--bluGlow);color:var(--blu)}
.cal-card-tag.reg-closed{background:var(--card2);color:var(--t3)}
.cal-card-tag.reg-ballot{background:#f4e9ff;color:#6b3fa0}
.cal-card-tag.reg-upcoming{background:var(--card2);color:var(--t2)}
.cal-card-reg{font-size:13px;color:var(--t3);font-weight:500}
.cal-card-link{font-size:13px;color:var(--grn);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.cal-card-link:hover{text-decoration:underline}
.cal-card-notes{font-size:12px;color:var(--t2);line-height:1.4;font-style:italic;padding:8px 12px;background:var(--bg2);border-radius:8px}
.cal-card.has-strat{cursor:pointer}
.cal-card.has-strat .cal-card-strat-hint{font-size:11px;color:var(--grn);font-weight:700;display:flex;align-items:center;gap:5px;margin-top:4px}
/* Race strategy modal */
.strat-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.strat-modal{background:var(--bg);border-radius:18px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative}
.strat-modal-head{background:linear-gradient(135deg,var(--grn) 0%,#0a6b40 100%);color:#fff;padding:24px 28px;border-radius:18px 18px 0 0;position:sticky;top:0;z-index:1}
.strat-modal-head h2{font-size:20px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px}
.strat-modal-head .strat-meta{font-size:13px;opacity:.85}
.strat-modal-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.strat-modal-close:hover{background:rgba(255,255,255,.35)}
.strat-body{padding:24px 28px}
.strat-goals{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.strat-goal{border-radius:12px;padding:16px 18px;border:2px solid var(--bdr)}
.strat-goal.goal-a{border-color:var(--grn);background:var(--grnSoft)}
.strat-goal.goal-b{border-color:var(--blu);background:var(--bluGlow)}
.strat-goal-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.strat-goal.goal-a .strat-goal-label{color:var(--grn)}
.strat-goal.goal-b .strat-goal-label{color:var(--blu)}
.strat-goal-time{font-family:'JetBrains Mono';font-size:28px;font-weight:800;color:var(--t1);line-height:1}
.strat-goal-pace{font-family:'JetBrains Mono';font-size:14px;color:var(--t2);margin-top:4px}
.strat-goal-desc{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.4}
.strat-section-h{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.strat-section-h::after{content:'';flex:1;height:1px;background:var(--bdr)}
.strat-splits{width:100%;border-collapse:collapse;font-size:13px}
.strat-splits th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-align:left;padding:8px 10px;border-bottom:2px solid var(--bdr)}
.strat-splits td{padding:8px 10px;border-bottom:1px solid var(--bdr);font-family:'JetBrains Mono'}
.strat-splits tr:last-child td{border-bottom:none;font-weight:700}
.strat-splits .col-a{color:var(--grn);font-weight:600}
.strat-splits .col-b{color:var(--blu);font-weight:600}
.strat-splits .km-label{color:var(--t2);font-weight:600}
.strat-splits .split-note{font-family:'Inter';font-size:11px;color:var(--t3);font-style:italic}
.strat-tip{background:var(--bg2);border-left:3px solid var(--grn);padding:12px 16px;border-radius:0 10px 10px 0;margin-top:16px;font-size:13px;line-height:1.5;color:var(--t2)}
.strat-tip strong{color:var(--t1)}
.strat-coach{background:linear-gradient(135deg,rgba(34,201,122,.07),rgba(78,159,255,.07));border:1px solid rgba(34,201,122,.25);border-radius:12px;padding:14px 16px;margin-top:16px;font-size:13px;line-height:1.6;color:var(--t2)}
.strat-coach-h{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--grn);margin-bottom:8px}
.plan-phase-note{background:var(--bg2);border-left:3px solid var(--grn);padding:10px 14px;font-size:13px;line-height:1.5;color:var(--t2);border-radius:0 8px 8px 0;margin-bottom:14px}
@media(max-width:600px){.strat-goals{grid-template-columns:1fr}.strat-modal{max-width:100%;border-radius:14px}.strat-modal-head{border-radius:14px 14px 0 0;padding:18px 20px}.strat-body{padding:18px 20px}}
@media (max-width:640px){
  .cal-hero{padding:18px 20px}
  .cal-hero-cd{font-size:40px}
  .cal-hero-name{font-size:19px}
  .cal-grid{grid-template-columns:1fr;gap:10px}
  .cal-card{padding:14px 16px}
}

/* INTERVAL CARDS - Expandable style like races */
.int-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.int-toolbar .cmp-toggle{font-family:'Inter';font-size:12px;font-weight:700;padding:10px 20px;border:2px solid var(--bdr);border-radius:10px;background:var(--card);color:var(--t2);cursor:pointer;transition:all .2s;margin-left:auto}
.int-toolbar .cmp-toggle:hover{border-color:var(--bdr2);color:var(--t1)}
.int-toolbar .cmp-toggle.active{border-color:var(--grn);background:var(--grnSoft);color:var(--grn)}
.int-count{font-size:13px;color:var(--t3);font-weight:600}
.ic{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:all .15s;border-left:4px solid var(--grn)}
.ic:hover{border-color:var(--bdr2);box-shadow:var(--shadow);border-left-color:var(--grn)}
.ic.sel{border-color:var(--grn);background:var(--grnSoft)}
.ic-spark{display:flex;align-items:flex-end;gap:2px;height:26px;margin-left:auto}
.ic-spark-bar{width:6px;border-radius:2px 2px 0 0;min-height:3px}
.ic-best-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(13,140,84,.08);color:var(--grn);font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.ic-head{padding:18px 22px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ic-top{display:flex;justify-content:space-between;align-items:center}
.ic-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.ic-date{font-size:12px;color:var(--t3);font-weight:500}
.ic-stats{display:flex;gap:24px;margin-top:12px;flex-wrap:wrap}
.ic-chevron{color:var(--t3);transition:transform .2s;font-size:18px}
.ic.open .ic-chevron{transform:rotate(180deg)}
.ic-body{display:none;padding:0 22px 20px;border-top:1px solid var(--bdr)}
.ic.open .ic-body{display:block}
.ic-detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.ic-detail{background:var(--card2);border-radius:10px;padding:12px 14px}
.ic-detail .sl{margin-bottom:4px}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--bdr2);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-right:6px}
.ic.sel .chk{background:var(--grd1);border-color:var(--grn)}

/* CMP TABLE */
.cmp{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-top:24px;display:none}
.cmp.show{display:block}
.cmp-h{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);font-weight:700;margin-bottom:18px}
.ct{width:100%;border-collapse:collapse;font-size:13px}
.ct th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-weight:700;border-bottom:2px solid var(--bdr)}
.ct th.best{border-bottom-color:var(--grn);color:var(--grn)}
.ct td{padding:8px 14px;border-bottom:1px solid var(--bdr);font-family:'JetBrains Mono';font-weight:600;font-size:12px}
.ct td:first-child{font-family:'Inter';color:var(--t3);font-size:13px;font-weight:600}
.ct td.bv{color:var(--grn);font-weight:700}
.ct tr:last-child td{border:none}

/* PLAN */
.phase-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:12px 18px;border-radius:10px;margin-bottom:14px}
.phase-h.base{background:var(--bluGlow);color:var(--blu);border:1px solid rgba(78,159,255,.15)}
.phase-h.build{background:var(--grnSoft);color:var(--grn);border:1px solid rgba(34,201,122,.15)}
.phase-h.peak{background:var(--orgGlow);color:var(--org);border:1px solid rgba(245,158,66,.15)}
.phase-h.taper{background:var(--card2);color:var(--t2);border:1px solid var(--bdr)}
.phase-h.threshold{background:rgba(106,78,200,.08);color:var(--prp);border:1px solid rgba(106,78,200,.15)}
.phase-h.specificity{background:var(--grnSoft);color:var(--grn);border:1px solid rgba(34,201,122,.15)}
.phase-h.consolidation{background:var(--orgGlow);color:var(--org);border:1px solid rgba(245,158,66,.15)}
.phase-h.raceweek{background:var(--redGlow);color:var(--red);border:1px solid rgba(211,40,40,.15)}
.ts{background:rgba(106,78,200,.08);color:var(--prp)}
.pw{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.pw:hover{border-color:var(--bdr2)}
.pw.pw-past{opacity:.5}.pw.pw-past:hover{opacity:.75}
.pw.pw-current{border-left:4px solid var(--grn);box-shadow:0 0 0 1px var(--grn),var(--shadowL)}
.pw-now-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;background:var(--grn);color:#fff;padding:2px 8px;border-radius:4px;margin-left:10px;vertical-align:middle}
.pw-head{padding:14px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-user-select:none;user-select:none}
.pw-label{font-size:14px;font-weight:700}
.pw-vol{font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--grn);display:flex;align-items:center;gap:10px}
.pw-progress{width:60px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}.pw-progress-fill{height:100%;background:var(--grn);border-radius:3px;transition:width .3s}
.pw-body{display:none;padding:0 20px 16px;border-top:1px solid var(--bdr)}
.pw.open .pw-body{display:block}
.pd{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;align-items:center}
.pd:last-child{border:none}
.pd-d{font-weight:700;min-width:38px;color:var(--t3);font-size:11px;text-transform:uppercase}
.pd-t{min-width:82px;font-weight:700;font-size:12px;padding:3px 10px;border-radius:6px;text-align:center}
.pd-desc{color:var(--t2);flex:1}
.pd-chk{width:20px;height:20px;border:2px solid var(--bdr2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.pd-chk:hover{border-color:var(--grn)}.pd-chk.done{background:var(--grn);border-color:var(--grn)}
.pd-chk.done::after{content:'';display:block;width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

/* STREAK & CONSISTENCY */
.streak-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.streak-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;text-align:center}
.streak-val{font-family:'JetBrains Mono';font-size:32px;font-weight:800;line-height:1.1}
.streak-label{font-size:13px;color:var(--t3);font-weight:600;margin-top:4px}
.streak-sub{font-size:12px;color:var(--t3);margin-top:2px}
.consistency-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:6px}
.consistency-fill{height:100%;border-radius:4px;background:var(--grd1)}

/* EFFORT DONUT */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut-svg{width:160px;height:160px;flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-leg-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.donut-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-leg-pct{font-family:'JetBrains Mono';color:var(--t3);min-width:36px;text-align:right;font-size:13px}

/* SHOE TRACKER */
.shoe-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
.shoe-bar{height:10px;background:var(--bg2);border-radius:5px;overflow:hidden;margin-top:8px}
.shoe-fill{height:100%;border-radius:5px;transition:width .3s}
.pd-km{font-family:'JetBrains Mono';font-weight:600;min-width:50px;text-align:right;color:var(--t3)}
.te{background:var(--bluGlow);color:var(--blu)}.tq{background:var(--grnSoft);color:var(--grn)}.tl{background:var(--orgGlow);color:var(--org)}.tr2{background:var(--card2);color:var(--t3)}.tx{background:var(--redGlow);color:var(--red);font-weight:800}
.plan-phase{margin-bottom:32px}

/* DROP ZONE */
.drop-zone{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);z-index:999;display:none;align-items:center;justify-content:center;pointer-events:none}
.drop-zone.show{display:flex}
.drop-zone-inner{border:3px dashed var(--grn);border-radius:24px;padding:60px;text-align:center;color:var(--grn);font-size:20px;font-weight:700}

/* HR PROFILE MINI BAR */
.hr-bar{display:flex;align-items:center;gap:12px;margin-top:8px}
.hr-bar-fill{height:6px;border-radius:3px;flex:1;background:var(--card3);overflow:hidden;position:relative}
.hr-bar-fill span{position:absolute;left:0;top:0;bottom:0;border-radius:3px}

/* PACE TREND CHART */
.chart-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;position:relative;overflow:hidden;max-width:100%}
.chart-svg{width:100%;height:200px;overflow:hidden;display:block}
.chart-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chart-area{opacity:.08}
.chart-dot{transition:r .15s}
.chart-dot:hover{r:5}
.chart-legend{display:flex;gap:20px;margin-top:12px;font-size:13px;font-weight:600;color:var(--t3)}
.chart-legend span{display:flex;align-items:center;gap:6px}
.chart-legend .leg-line{width:16px;height:3px;border-radius:2px}
.chart-target-line{stroke-dasharray:6 4;opacity:.5}
.chart-grid-line{stroke:var(--bdr);stroke-width:1}
.chart-label{font-size:11px;fill:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:500}
.chart-tooltip{position:absolute;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;pointer-events:none;box-shadow:var(--shadowL);display:none;z-index:10}

/* TRAINING LOAD */
.load-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.load-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;text-align:center}
.load-card .lv{font-family:'JetBrains Mono';font-size:32px;font-weight:700;margin:8px 0 4px}
.load-card .ls{font-size:11px;font-weight:600}
.load-bar-wrap{display:flex;gap:2px;height:80px;align-items:flex-end;margin-top:16px}
.load-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.load-bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.load-bar-lbl{font-size:7px;color:var(--t3);margin-top:3px;font-weight:600}

/* GOAL PACE SIMULATOR */
.goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.goal-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;text-align:center}
.goal-card .gv{font-family:'JetBrains Mono';font-size:28px;font-weight:700;margin:8px 0}
.goal-splits{display:flex;gap:2px;align-items:flex-end;height:60px;margin-top:16px}
.goal-split{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}

/* RACE PREDICTOR */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.pred-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.pred-card.actual{border-color:var(--grn)}
.pred-card.actual::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--grd1)}
.pred-from{font-size:9px;color:var(--t3);font-weight:600;margin-top:8px}

/* LOCATION TRACKING */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.loc-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:all .2s}
.loc-card:hover{border-color:var(--bdr2);box-shadow:var(--shadow)}
.loc-bar{height:5px;border-radius:3px;background:var(--card3);margin-top:10px;overflow:hidden}
.loc-bar-fill{height:100%;border-radius:3px;background:var(--grd1)}

/* SPARKLINES */
.spark{display:inline-block;vertical-align:middle;margin-left:6px}
.spark svg{width:56px;height:18px;overflow:visible}
.spark path{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* PROGRESS RINGS */
.ring-wrap{display:flex;gap:14px;flex-wrap:wrap}
.ring-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;display:flex;align-items:center;gap:18px;flex:1;min-width:200px}
.ring-svg{width:76px;height:76px;flex-shrink:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--card3);stroke-width:5}
.ring-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
.ring-pct{font-family:'JetBrains Mono';font-size:13px;font-weight:700;fill:var(--t1);transform:rotate(90deg);transform-origin:center}
.ring-info .ri-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px}
.ring-info .ri-val{font-family:'JetBrains Mono';font-size:22px;font-weight:700;margin:4px 0}
.ring-info .ri-sub{font-size:11px;color:var(--t3);font-weight:500}

/* CALENDAR HEATMAP */
.heatmap-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.heatmap{display:flex;align-items:flex-start}
.hm-grid{display:grid;grid-template-rows:repeat(7,13px);grid-auto-flow:column;gap:2px}
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--card3);transition:transform .1s;position:relative}
.hm-cell:hover{transform:scale(1.4);z-index:2}
.hm-cell.l1{background:rgba(13,140,84,.18)}
.hm-cell.l2{background:rgba(13,140,84,.38)}
.hm-cell.l3{background:rgba(13,140,84,.6)}
.hm-cell.l4{background:var(--grn)}
.hm-cell.today{outline:2px solid var(--org);outline-offset:-1px}
.hm-labels{display:grid;grid-template-rows:repeat(7,13px);gap:2px;margin-right:6px;flex-shrink:0}
.hm-label{font-size:7px;color:var(--t3);font-weight:600;display:flex;align-items:center}
.hm-months{display:flex;margin-top:4px;font-size:8px;color:var(--t3);font-weight:600}
.hm-months span{flex-shrink:0}
.hm-legend{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3);font-weight:600;margin-top:8px;justify-content:flex-end}
.hm-legend-cell{width:11px;height:11px;border-radius:2px}

/* ACTIVITY FEED */
.feed{display:flex;flex-direction:column;gap:4px}
.feed-item{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;transition:all .15s;cursor:pointer}
.feed-item:hover{border-color:var(--bdr2);box-shadow:var(--shadow)}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.feed-date{font-size:10px;color:var(--t3);font-weight:600;min-width:68px;flex-shrink:0}
.feed-title{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-stats{display:flex;gap:14px;font-size:11px;font-family:'JetBrains Mono';font-weight:600;color:var(--t2);flex-shrink:0}

/* HR ZONES */
.zone-bars{display:flex;flex-direction:column;gap:5px}
.zone-row{display:flex;align-items:center;gap:8px}
.zone-label{font-size:13px;font-weight:700;min-width:24px;color:var(--t3)}
.zone-name{font-size:12px;min-width:68px;color:var(--t3);font-weight:500}
.zone-bar-outer{flex:1;height:20px;background:var(--card3);border-radius:6px;overflow:hidden}
.zone-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:#fff;min-width:2px}
.zone-pct{font-size:13px;font-weight:700;min-width:34px;text-align:right;font-family:'JetBrains Mono';color:var(--t2)}

/* ELEVATION */
.elev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}

/* RECOVERY */
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rec-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.rec-card .rv{font-family:'JetBrains Mono';font-size:28px;font-weight:700;margin:6px 0}

/* SEASON BESTS TIMELINE */
.sb-dist{margin-bottom:20px}
.sb-label{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sb-timeline{display:flex;align-items:flex-end;gap:4px;height:80px;position:relative;overflow-x:auto;padding-bottom:4px}
.sb-timeline::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--bdr)}
.sb-item{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.sb-bar{width:100%;max-width:40px;border-radius:6px 6px 0 0;min-height:4px;transition:height .4s}
.sb-time{font-size:9px;font-family:'JetBrains Mono';font-weight:600;margin-bottom:4px;white-space:nowrap}
.sb-pdate{font-size:7px;color:var(--t3);margin-top:6px;white-space:nowrap}

/* ANIMATED COUNTERS */
.anim-num{display:inline-block}

/* ALL RUNS FEED */
.rf-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:20px 24px 14px;border-bottom:1px solid var(--bdr)}
.rf-search{flex:1;min-width:160px;padding:8px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);color:var(--t1);font-size:13px;outline:none}
.rf-search:focus{border-color:var(--grn)}
.rf-filter{display:flex;gap:6px;flex-wrap:wrap}
.rf-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.rf-pill.on{background:var(--grn);color:#fff;border-color:var(--grn)}
.rf-count{font-size:12px;color:var(--t3);white-space:nowrap}
.rfi{border-bottom:1px solid var(--bdr2);transition:background .12s}
.rfi:hover .rfi-row{background:var(--card2)}
.rfi.open .rfi-row{background:var(--card2)}
.rfi-row{display:grid;grid-template-columns:auto 1fr auto auto auto auto;align-items:center;gap:12px;padding:13px 24px;cursor:pointer;min-height:54px;user-select:none}
.rfi-badge{font-size:9px;font-weight:800;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.rfi-badge.easy,.rfi-badge.moderate,.rfi-badge.steady,.rfi-badge.fast,.rfi-badge.recovery{background:rgba(76,175,80,.12);color:var(--grn)}
.rfi-badge.tempo,.rfi-badge.progressive{background:rgba(156,39,176,.12);color:var(--prp)}
.rfi-badge.intervals{background:rgba(33,150,243,.12);color:var(--blu)}
.rfi-badge.long{background:rgba(244,67,54,.12);color:var(--red)}
.rfi-badge.race,.rfi-badge.parkrun{background:rgba(255,152,0,.12);color:var(--org)}
.rfi-badge.other{background:rgba(150,150,150,.12);color:var(--t3)}
.rfi-title{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.rfi-date{font-size:11px;color:var(--t3);white-space:nowrap;text-align:right}
.rfi-dist{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;text-align:right;min-width:56px}
.rfi-pace{font-size:12px;color:var(--t2);white-space:nowrap;font-family:'JetBrains Mono',monospace;text-align:right;min-width:56px}
.rfi-hr{font-size:12px;color:var(--t3);white-space:nowrap;text-align:right;min-width:48px}
.rfi-detail{display:none;padding:16px 24px 20px;border-top:1px solid var(--bdr2);background:var(--card2)}
.rfi.open .rfi-detail{display:block}
.rfi-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding-top:16px;margin-bottom:16px}
.rfi-stat-item{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px}
.rfi-stat-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.rfi-stat-val{font-size:16px;font-weight:700;color:var(--t1)}
.rfi-stat-unit{font-size:10px;color:var(--t3);font-weight:400}
.rfi-splits-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px}
.rfi-splits{display:flex;gap:3px;align-items:flex-end;margin-bottom:4px}
.rfi-split-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.rfi-split-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:opacity .15s}
.rfi-split-bar:hover{opacity:.75}
.rfi-split-lbl{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.rfi-splits-axis{display:flex;gap:3px;margin-bottom:12px}
.rfi-splits-axis .rfi-split-col{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-align:center}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  /* Sidebar → fixed bottom tab bar on mobile */
  .shell{flex-direction:column}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;height:auto;flex-direction:row;border-right:none;border-top:1px solid var(--bdr);overflow-x:auto;overflow-y:visible;z-index:100}
  .sidebar-brand,.sidebar-foot{display:none}
  .sidebar-nav{flex-direction:row;padding:4px 2px;gap:0;overflow-x:auto;scrollbar-width:none;flex:1;align-items:stretch;justify-content:space-between}
  .sidebar-nav::-webkit-scrollbar{display:none}
  .nav-btn{flex:1;min-width:60px;max-width:80px;padding:6px 4px 5px;font-size:10px;text-align:center;border-radius:8px;white-space:nowrap;width:auto;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:center}
  .nav-btn.on{background:var(--grnSoft)}
  .nav-btn.on::before{display:none}
  .nb-icon{display:block}
  .nb-label{font-size:9px;font-weight:600;color:inherit;line-height:1}
  .nav-btn.on .nb-label{color:var(--grn)}
  .main-wrap{padding:16px 16px 90px}
  /* Grids */
  .g5{grid-template-columns:repeat(2,1fr)}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  .load-cards{grid-template-columns:repeat(2,1fr)}
  .goal-grid{grid-template-columns:1fr}
  .pred-grid{grid-template-columns:repeat(2,1fr)}
  .loc-grid{grid-template-columns:repeat(2,1fr)}
  .rec-grid{grid-template-columns:repeat(2,1fr)}
  .elev-grid{grid-template-columns:1fr}
  /* Stat tiles */
  .st .sv{font-size:22px}
  .st .sl{font-size:11px}
  /* Sections */
  .sec{margin-top:20px}
  .sec-h{font-size:11px;letter-spacing:2px;margin-bottom:10px}
  /* Charts */
  .chart-svg{height:140px}
  .wk-grid{gap:1px}.wk-col{min-width:32px}.wk-val{font-size:10px}.wk-bar-wrap{height:70px}
  /* Rings */
  .ring-wrap{flex-direction:column}
  .ring-card{min-width:0}
  .ring-svg{width:56px;height:56px}
  .ring-info .ri-val{font-size:18px}
  /* Tables */
  .ct{font-size:11px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ct th,.ct td{padding:6px 8px;white-space:nowrap}
  /* Race cards */
  .rc-head{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .rc-name{font-size:13px}
  .rc-date{font-size:11px}
  .rc-stats{display:grid !important;grid-template-columns:repeat(2,1fr);gap:8px 16px}
  .split-km{min-width:26px;font-size:10px}
  .split-bar{font-size:10px;height:20px;padding:0 6px}
  /* Interval cards */
  .ic-top{flex-wrap:wrap;gap:4px}
  .ic-title{font-size:13px}
  .ic-date{font-size:11px}
  .ic-stats{display:grid !important;grid-template-columns:repeat(2,1fr);gap:8px 16px}
  .ic-detail-grid{grid-template-columns:repeat(2,1fr)}
  .int-toolbar{gap:6px;flex-wrap:wrap}
  .int-toolbar .cmp-toggle{margin-left:0;font-size:11px;padding:8px 12px}
  /* All Runs feed */
  .rf-controls{padding:16px 16px 10px;gap:8px}
  .rf-search{font-size:13px;padding:10px 14px;min-height:44px}
  .rf-filter{gap:4px}
  .rf-pill{padding:6px 12px;font-size:11px;min-height:36px}
  .rfi-row{grid-template-columns:auto 1fr auto;gap:8px;padding:12px 16px;min-height:56px}
  .rfi-date{display:none}
  .rfi-dist{font-size:14px;min-width:44px}
  .rfi-pace{display:none}
  .rfi-hr{display:none}
  .rfi-title{font-size:14px}
  .rfi-detail{padding:0 16px 16px}
  /* Misc */
  .feed-title{font-size:12px}
  .feed-stats{display:none}
  .zone-name{display:none}
  .hm-cell{width:10px;height:10px}
  .hm-grid{grid-template-rows:repeat(7,10px)}
  .hm-labels{grid-template-rows:repeat(7,10px)}
  .cmp{padding:12px}
  .sb-timeline{height:56px}
  .sb-time{font-size:8px}
  .mn .mnv{font-size:13px}
  .rec-card .rv{font-size:20px}
  .pb .pv{font-size:22px}
  .goal-card .gv{font-size:22px}
  .status-badge-wrap{flex-wrap:wrap;gap:6px}
}
@media(max-width:420px){
  .wrap{padding:12px 12px 80px}
  .hero h1{font-size:20px}
  .hero{padding:16px}
  .cd .n{font-size:30px}
  .g5,.g4,.load-cards{grid-template-columns:1fr}
  .pred-grid,.loc-grid{grid-template-columns:1fr}
  .rec-grid{grid-template-columns:1fr}
  .st .sv{font-size:18px}
  .rfi-row{padding:12px}
  .rf-controls{padding:12px 12px 8px}
}

/* GARMIN SECTIONS */
.garmin-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.garmin-badge.productive{background:rgba(13,140,84,.1);color:var(--grn)}
.garmin-badge.maintaining{background:rgba(192,108,28,.1);color:var(--org)}
.garmin-badge.detraining{background:rgba(211,40,40,.1);color:var(--red)}
.garmin-badge.recovery{background:rgba(30,108,192,.1);color:var(--blu)}
.garmin-badge.peaking{background:rgba(106,78,200,.1);color:var(--prp)}
.garmin-badge.overreaching{background:rgba(211,40,40,.1);color:var(--red)}
.garmin-badge.unproductive{background:rgba(211,40,40,.06);color:var(--red)}
.readiness-gauge{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.readiness-score{font-size:56px;font-weight:800;line-height:1}
.readiness-level{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.readiness-bars{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.readiness-bar-item{text-align:center}
.readiness-bar-item .bar-track{height:6px;background:var(--card3);border-radius:3px;margin-top:6px;overflow:hidden}
.readiness-bar-item .bar-value{height:100%;border-radius:3px}
.readiness-bar-item .rl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:700}
.readiness-bar-item .rv{font-size:14px;font-weight:700;margin-top:2px}
.readiness-mini{display:flex;align-items:flex-end;gap:3px;height:50px;margin-top:16px}
.readiness-mini .rm-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px}
.acwr-meter{position:relative;height:32px;background:var(--card3);border-radius:16px;overflow:hidden;margin:16px 0}
.acwr-meter .zone{position:absolute;top:0;height:100%}
.acwr-meter .marker{position:absolute;top:-4px;width:4px;height:40px;background:var(--t1);border-radius:2px;z-index:2}
.acwr-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.pred-time{font-size:32px;font-weight:800;line-height:1}
.pred-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin-bottom:6px}
.profile-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.profile-item{text-align:center;padding:14px 8px;background:var(--card);border:1px solid var(--bdr);border-radius:12px}
.profile-item .pi-val{font-size:22px;font-weight:800;margin:4px 0}
.profile-item .pi-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:700}
.pr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pr-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;text-align:center}
.pr-card .pr-dist{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700}
.pr-card .pr-time{font-size:22px;font-weight:800;margin:4px 0}
.pr-card .pr-pace{font-size:13px;color:var(--t2);font-weight:600}
.pr-card .pr-date{font-size:12px;color:var(--t3);margin-top:4px}
.garmin-sparkline{display:flex;align-items:flex-end;gap:2px;height:40px}
.garmin-sparkline .sp-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px}
.status-badge-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
.endurance-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(30,108,192,.1);color:var(--blu)}
@media(max-width:600px){
  .profile-grid{grid-template-columns:repeat(2,1fr)}
  .pr-grid{grid-template-columns:repeat(2,1fr)}
  .readiness-bars{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:380px){
  .profile-grid{grid-template-columns:1fr}
  .pr-grid{grid-template-columns:1fr}
}

/* MODALS */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);cursor:pointer}
.modal-box{position:relative;background:var(--card);border-radius:16px;max-width:900px;max-height:85vh;width:90%;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:1001}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:24px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--card);z-index:10}
.modal-header h2{font-size:18px;font-weight:700;color:var(--t1);margin:0}
.modal-close{background:none;border:none;font-size:24px;color:var(--t3);cursor:pointer;padding:0 4px;transition:color .2s}
.modal-close:hover{color:var(--t1)}
.modal-content{padding:24px}

/* REP COMPARISON MODAL SPECIFIC */
.rep-tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--bdr)}
.rep-tab{padding:12px 16px;cursor:pointer;border:none;background:none;color:var(--t3);font-weight:600;font-size:13px;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.rep-tab.active{color:var(--grn);border-bottom-color:var(--grn)}
.rep-tab:hover{color:var(--t1)}
.rep-details{display:none}
.rep-details.show{display:block}
.rep-row{display:grid;grid-template-columns:60px 1fr 100px 100px;gap:16px;align-items:center;padding:12px 0;border-bottom:1px solid var(--bdr2);font-size:13px}
.rep-row:last-child{border-bottom:none}
.rep-num{font-weight:700;color:var(--t1);font-family:'JetBrains Mono'}
.rep-bar-wrap{display:flex;align-items:center;height:24px;background:var(--card2);border-radius:4px;overflow:hidden}
.rep-bar{height:100%;background:var(--grd1);transition:width .3s}
.rep-time{text-align:right;font-family:'JetBrains Mono';color:var(--t1);font-weight:600}
.rep-pace{text-align:right;font-family:'JetBrains Mono';color:var(--t2);font-weight:500}
.rep-summary{margin-top:16px;padding:12px;background:var(--card2);border-radius:8px;font-size:12px}
.rep-summary-item{display:grid;grid-template-columns:100px 1fr;gap:12px;margin:6px 0}

/* RUN DETAILS MODAL SPECIFIC */
.run-detail-section{border-bottom:1px solid var(--bdr2)}
.run-detail-section:last-child{border-bottom:none}
.run-acc-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 0;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left}
.run-acc-toggle:hover .run-section-h{color:var(--t1)}
.run-section-h{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin:0;transition:color .15s}
.run-acc-toggle .run-section-h{pointer-events:none}
.run-acc-chevron{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.run-acc-body{overflow:hidden;transition:max-height .25s ease,padding .2s ease;padding-bottom:16px}
.run-acc-body.collapsed{max-height:0!important;padding-bottom:0}
.run-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.run-stat{display:flex;flex-direction:column}
.run-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:700;margin-bottom:4px}
.run-stat-value{font-family:'JetBrains Mono';font-size:16px;font-weight:700;color:var(--t1)}
.run-splits-table{width:100%;border-collapse:collapse;font-size:12px}
.run-splits-table th{background:var(--card2);padding:8px;text-align:left;font-weight:700;color:var(--t1);border-bottom:1px solid var(--bdr)}
.run-splits-table td{padding:10px 8px;border-bottom:1px solid var(--bdr2)}
.run-splits-table tr:hover{background:var(--card2)}

/* WEEKLY VIEW */
.weekly-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.week-nav{display:flex;gap:12px;align-items:center}
.week-nav-btn{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--t1);font-weight:600;font-size:13px;transition:all .2s}
.week-nav-btn:hover{border-color:var(--grn);color:var(--grn);transform:translateY(-1px)}
.max-week-btn{background:var(--grnGlow);border:1px solid var(--grn);color:var(--grn);padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;transition:all .2s}
.max-week-btn:hover{background:var(--grn);color:white}
.weekly-container{display:flex;gap:16px;overflow-x:auto;padding:16px 0;scroll-behavior:smooth}
.week-card{min-width:320px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;transition:all .2s}
.week-card:hover{border-color:var(--grn);box-shadow:var(--shadowL)}
.week-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.week-label{font-size:13px;font-weight:700;color:var(--t1)}
.week-km{font-family:'JetBrains Mono';font-size:24px;font-weight:700;color:var(--grn);line-height:1}
.week-date{font-size:10px;color:var(--t3);margin-top:2px}
.week-chart{display:flex;gap:3px;height:100px;margin:16px 0;align-items:flex-end}
.day-bar{flex:1;background:var(--grd1);border-radius:3px 3px 0 0;opacity:.6;transition:all .2s;min-height:4px;position:relative}
.day-bar:hover{opacity:1}
.day-bar-label{position:absolute;bottom:-18px;width:100%;text-align:center;font-size:7px;color:var(--t3);font-weight:700}
.week-runs{margin-top:16px;border-top:1px solid var(--bdr);padding-top:16px}
.week-run-card{padding:12px 0;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:all .2s}
.week-run-card:last-child{border-bottom:none}
.week-run-card:hover{padding-left:8px;color:var(--grn)}
.week-run-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;font-size:12px;font-weight:600}
.week-run-time{font-size:10px;color:var(--t3)}
.week-run-detail{font-size:11px;color:var(--t2);margin-top:2px;font-family:'JetBrains Mono'}

/* RESPONSIVE CHART FIX */
.chart-wrap{padding:12px;position:relative;overflow:hidden}
.chart-svg{width:100%;height:auto;display:block;overflow:hidden}

/* ===== DASH HERO BANNER ===== */
.dash-hero{background:var(--grd1);color:#fff;border-radius:20px;padding:28px 32px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.dash-hero::after{content:'';position:absolute;right:60px;bottom:-80px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%;pointer-events:none}
.dash-hero-race{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1}
.dash-hero-date{font-size:13px;opacity:.7;margin-top:4px;font-weight:500}
.dash-hero-goal{font-size:13px;opacity:.85;margin-top:10px;font-weight:600;letter-spacing:.1px}
.dash-hero-row{display:flex;align-items:center;gap:8px;margin-top:18px;flex-wrap:wrap}
.dash-hero-pill{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;white-space:nowrap}
.dash-hero-prog-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:80px}
.dash-hero-prog{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.dash-hero-prog-fill{height:100%;background:rgba(255,255,255,.9);border-radius:3px}
.dash-hero-prog-label{font-size:10px;opacity:.65;white-space:nowrap}
.dash-hero-status{position:absolute;top:18px;right:20px;background:rgba(255,255,255,.15);border-radius:12px;padding:5px 12px;font-size:11px;font-weight:700;backdrop-filter:blur(4px)}

/* ===== ACTIVITY FEED ===== */
.act-feed{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.act-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .15s}
.act-row:last-child{border-bottom:none}
.act-row:hover{background:var(--bg2)}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.act-title{flex:1;font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.act-date{font-size:11px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.act-dist{font-size:13px;font-weight:700;color:var(--t1);font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.act-pace{font-size:11px;color:var(--t2);white-space:nowrap;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.act-view-all{display:block;text-align:center;padding:9px;font-size:12px;color:var(--grn);font-weight:700;cursor:pointer;border-top:1px solid var(--bdr);transition:background .15s}
.act-view-all:hover{background:var(--grnSoft)}

/* ===== UNIFIED DASHBOARD CARDS ===== */
.dash-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px 20px;line-height:1.5}
.dash-card.tight{padding:14px 16px}
.dash-card-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:12px}
.dash-row{display:grid;gap:14px;margin-bottom:16px}
.dash-row > .dash-card{display:flex;flex-direction:column;height:100%}
.dash-row > div{display:flex;flex-direction:column;height:100%}
.dash-row > div > .dash-card{flex:1;display:flex;flex-direction:column}
.dash-row > div > .act-feed{flex:1;display:flex;flex-direction:column}
.dash-row-2{grid-template-columns:1fr 1fr}
.dash-row-3{grid-template-columns:1fr 1fr 1fr}
.dash-row-3-2{grid-template-columns:3fr 2fr}
@media(max-width:768px){.dash-row-2,.dash-row-3,.dash-row-3-2{grid-template-columns:1fr}}

/* ===== PERFORMANCE PROFILE + EXPLAINERS ===== */
.perf-profile{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:13px;line-height:1.5}
.perf-profile-row{display:flex;flex-wrap:wrap;gap:8px 18px;color:var(--t2)}
.perf-profile-row strong{color:var(--t1);font-weight:700}
.perf-profile-row + .perf-profile-row{margin-top:4px}
.perf-explain{background:var(--bg2);border-left:3px solid var(--grn);padding:11px 14px;font-size:13px;line-height:1.5;color:var(--t2);margin-top:10px;border-radius:0 8px 8px 0}
.perf-explain strong{color:var(--t1);font-weight:700}

/* ===== RACE COMPARISON ===== */
.race-cmp-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.race-cmp-toggle{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border:2px solid var(--bdr);border-radius:10px;background:var(--card);color:var(--t2);cursor:pointer;transition:all .2s}
.race-cmp-toggle.on{background:var(--grnSoft);color:var(--grn);border-color:var(--grn)}
.race-cmp-hint{font-size:12px;color:var(--t3);font-weight:600}
.race-cmp-clear{font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit}
.race-cmp-check{position:absolute;top:14px;right:14px;width:20px;height:20px;cursor:pointer;accent-color:var(--grn);z-index:2}
.race-cmp-panel{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px 22px;margin-top:18px}
.race-cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.race-cmp-col{background:var(--bg2);border-radius:10px;padding:12px 14px;font-size:13px;position:relative}
.race-cmp-col h4{margin:0 0 4px;font-size:14px;font-weight:700;color:var(--t1)}
.race-cmp-meta{font-size:11px;color:var(--t3);margin-bottom:8px}
.race-cmp-stats{display:flex;flex-direction:column;gap:3px;font-family:'JetBrains Mono',monospace;font-size:13px}
.race-cmp-stats span{color:var(--t2)}
.race-cmp-stats strong{color:var(--t1);font-weight:700}
.race-cmp-tab{width:100%;border-collapse:collapse;font-size:13px}
.race-cmp-tab th{font-size:11px;font-weight:700;color:var(--t3);text-align:left;padding:7px 10px;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:1px}
.race-cmp-tab th.num,.race-cmp-tab td.num{text-align:right;font-family:'JetBrains Mono',monospace}
.race-cmp-tab td{padding:7px 10px;border-bottom:1px solid var(--bdr2)}
.race-cmp-tab tr:last-child td{border-bottom:none}
.race-cmp-tab td.bv{color:var(--grn);font-weight:700}
.race-cmp-empty{text-align:center;padding:32px 16px;color:var(--t3);font-size:13px}

</style>
</head>

      avgRepTime = easyPaceSecs * repDistKm * 0.70;
    }
  }

  var reps = [];
  for (var i = 0; i < numReps; i++) {
    var factor;
    if (i === 0) factor = 1.01;
    else if (i === numReps - 1) factor = 0.97;
    else factor = 1 + (Math.sin(i * 1.1) * 0.015);
    var repTime = Math.round(avgRepTime * factor);
    var repPace = repTime / repDistKm;
    reps.push({
      num: i + 1,
      time: repTime < 60 ? repTime + 's' : secsToTimeMS(repTime),
      paceSecs: repPace,
      pace: secsToTimeMS(Math.round(repPace)),
      timeSecs: repTime,
      isTimeBased: false,
    });
  }
  return { reps: reps, repDist: repDistKm, repLabel: repInfo.label, intervalType: 'distance' };
}

var ints = [];
var intId = 0;
allRuns.forEach(function(r) {
  var isInt = r.type === 'Entrenamiento en pista' || intPatterns.test(r.title);
  if (!isInt) return;
  var repInfo = parseReps(r.title);
  var repData = generateReps(r, repInfo);
  // Best rep = fastest pace from calculated rep data (not Garmin's raw "Ritmo óptimo")
  var bestRepPace = r.bestPace;
  if (repData && repData.reps.length > 0) {
    var fastestPaceSecs = Math.min.apply(null, repData.reps.map(function(rep) { return rep.paceSecs; }));
    bestRepPace = secsToTimeMS(Math.round(fastestPaceSecs));
  }
  ints.push({
    id: intId++, title: r.title, date: formatDate(r.ds), ds: r.ds,
    dist: Math.round(r.dist*100)/100, time: secsToTime(r.timeSecs), timeSecs: r.timeSecs,
    pace: r.pace, best: bestRepPace, bestPaceRaw: r.bestPace,
    hr: r.hr, mhr: r.mhr, cad: r.cad, stride: r.stride, gct: r.gct, pw: r.pw,
    repInfo: repInfo, repData: repData, repSource: 'estimated',
  });
});

// Supplement interval rep data with real Strava splits from LAPS_DATA
// Priority: 1) description splits, 2) real fast laps, 3) keep estimated
ints.forEach(function(iv) {
  var dayEntries = LAPS_DATA[iv.ds];
  if (!dayEntries || !dayEntries.length) return;
  // Match by closest distance
  var best = dayEntries[0], bestDiff = Math.abs((dayEntries[0].dist_km || 0) - iv.dist);
  for (var di = 1; di < dayEntries.length; di++) {
    var diff = Math.abs((dayEntries[di].dist_km || 0) - iv.dist);
    if (diff < bestDiff) { bestDiff = diff; best = dayEntries[di]; }
  }

  // 1. Description splits (e.g. "3:38, 3:40, 3:38, 3:40, 3:48")
  var descTimes = parseDescSplits(best.desc);
  if (descTimes && descTimes.length >= 2) {
    var reps = descTimes.map(function(t, i) {
      var ps = paceToSecs(t);
      return { num: i + 1, time: t, timeSecs: ps, paceSecs: ps, pace: t, distanceKm: null, isFromDesc: true };
    });
    var fastestPs = Math.min.apply(null, reps.map(function(r) { return r.paceSecs; }));
    iv.repData = { reps: reps, repDist: null, repLabel: descTimes.length + ' reps', intervalType: 'distance' };
    iv.best = secsToTimeMS(Math.round(fastestPs));
    iv.repSource = 'desc';
    return;
  }

  // 2. Real Strava laps - keep only fast laps (reps, not warmup/recovery)
  var laps = best.laps;
  if (!laps || laps.length < 2) return;
  var avgS = paceToSecs(iv.pace);
  if (!avgS) return;
  var threshold = avgS * 0.92; // laps >8% faster than avg are reps
  var fastLaps = laps.filter(function(l) { return l.dist >= 0.2 && l.pace && paceToSecs(l.pace) < threshold; });
  if (fastLaps.length >= 2) {
    var reps = fastLaps.map(function(l, i) {
      var ps = paceToSecs(l.pace);
      return { num: i + 1, time: secsToTimeMS(l.time), timeSecs: l.time, paceSecs: ps, pace: l.pace, distanceKm: l.dist.toFixed(2), isFromDesc: false };
    });
    var fastestPs = Math.min.apply(null, reps.map(function(r) { return r.paceSecs; }));
    iv.repData = { reps: reps, repDist: fastLaps[0].dist, repLabel: fastLaps.length + ' reps', intervalType: 'distance' };
    iv.best = secsToTimeMS(Math.round(fastestPs));
    iv.repSource = 'strava';
  }
});

// ===== STREAK & CONSISTENCY =====
var streakData = (function() {
  var sorted = allRuns.slice().sort(function(a,b){ return a.ds > b.ds ? 1 : -1; });
  // Day streak: consecutive days with a run ending at today
  var runDays = {};
  sorted.forEach(function(r) { runDays[r.ds] = true; });
  var dayStreak = 0;
  var d = new Date(todayStr);
  while (runDays[d.toISOString().split('T')[0]]) {
    dayStreak++;
    d.setDate(d.getDate() - 1);
  }
  // Longest day streak ever
  var allDates = Object.keys(runDays).sort();
  var longestDay = 0, curDay = 1;
  for (var i = 1; i < allDates.length; i++) {
    var prev = new Date(allDates[i-1]); prev.setDate(prev.getDate() + 1);
    if (prev.toISOString().split('T')[0] === allDates[i]) { curDay++; }
    else { if (curDay > longestDay) longestDay = curDay; curDay = 1; }
  }
  if (curDay > longestDay) longestDay = curDay;
  // Weekly streak: consecutive weeks with 3+ runs
  var weekRuns = {};
  sorted.forEach(function(r) {
    var dt = new Date(r.date);
    var day = dt.getDay(), diff = (day === 0 ? -6 : 1 - day);
    var mon = new Date(dt); mon.setDate(dt.getDate() + diff);
    var key = mon.toISOString().split('T')[0];
    weekRuns[key] = (weekRuns[key] || 0) + 1;
  });
  var weekKeys = Object.keys(weekRuns).sort().reverse();
  var weekStreak = 0;
  var wk = new Date(todayStr);
  var wd = wk.getDay(), wdiff = (wd === 0 ? -6 : 1 - wd);
  wk.setDate(wk.getDate() + wdiff);
  while (weekRuns[wk.toISOString().split('T')[0]] >= 3) {
    weekStreak++;
    wk.setDate(wk.getDate() - 7);
  }
  // Longest weekly streak
  var longestWeek = 0, curWk = 0;
  var sortedWks = Object.keys(weekRuns).sort();
  for (var j = 0; j < sortedWks.length; j++) {
    if (weekRuns[sortedWks[j]] >= 3) {
      curWk++;
      if (curWk > longestWeek) longestWeek = curWk;
    } else { curWk = 0; }
  }
  // Consistency: % of last 12 weeks with 3+ runs
  var last12 = 0, hit12 = 0;
  var ck = new Date(todayStr);
  var cd2 = ck.getDay(), cdiff = (cd2 === 0 ? -6 : 1 - cd2);
  ck.setDate(ck.getDate() + cdiff);
  for (var x = 0; x < 12; x++) {
    last12++;
    if (weekRuns[ck.toISOString().split('T')[0]] >= 3) hit12++;
    ck.setDate(ck.getDate() - 7);
  }
  var conPct = last12 > 0 ? Math.round(hit12 / last12 * 100) : 0;
  return { dayStreak: dayStreak, longestDay: longestDay, weekStreak: weekStreak, longestWeek: longestWeek, conPct: conPct };
})();

  if (dayEntries && dayEntries.length) {
