    for (var i = 1; i < dayEntries.length; i++) {
      var diff = Math.abs((dayEntries[i].dist_km||0) - race.dist);
      if (diff < bestDiff) { bestDiff = diff; best = dayEntries[i]; }
    }
    if (best.laps && best.laps.length) {
      return { laps: best.laps.filter(function(l){return l.dist >= 0.2;}), source: 'strava' };
    }
  }
  if (race.splits && race.splits.length) {
    return {
      laps: race.splits.map(function(s, i){ return {n:i+1, dist:1, time:s.secs, pace:s.p, hr:null}; }),
      source: 'estimated'
    };
  }
  return null;
}

function renderRaceCompare() {
  if (!raceCompareIds.length) return '';
  var selected = raceCompareIds.map(function(id) {
    return races.filter(function(r){ return r.runId === id; })[0];
  }).filter(Boolean);
  if (selected.length === 0) return '';
  if (selected.length < 2) {
    return '<div class="race-cmp-panel"><div class="race-cmp-empty">Select <strong>at least 2 races</strong> to compare.</div></div>';
  }

  // Header strip with each race
  var headerCols = selected.map(function(r) {
    return '<div class="race-cmp-col">' +
      '<h4>' + r.name + '</h4>' +
      '<div class="race-cmp-meta">' + r.date + ' · ' + r.cat.toUpperCase() + '</div>' +
      '<div class="race-cmp-stats">' +
        '<span><strong>' + r.dist.toFixed(2) + '</strong> km</span>' +
        '<span><strong>' + r.time + '</strong></span>' +
        '<span><strong>' + r.pace + '</strong> /km</span>' +
        (r.hr ? '<span>HR <strong>' + r.hr + '</strong>' + (r.mhr ? ' / ' + r.mhr : '') + '</span>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  // Find best (fastest) overall pace
  var bestPaceSecs = Math.min.apply(null, selected.map(function(r){ return paceToSecs(r.pace) || 99999; }));

  // Get splits per race
  var raceSplits = selected.map(function(r){ return getRaceSplits(r); });
  var maxKm = 0;
  raceSplits.forEach(function(rs) {
    if (rs && rs.laps) maxKm = Math.max(maxKm, rs.laps.length);
  });

  // Build split-by-split table
  var thead = '<tr><th>km</th>' + selected.map(function(r){ return '<th class="num">' + r.name.replace(/^Race\s+–\s+/, '').slice(0, 18) + '</th>'; }).join('') + '</tr>';

  // Summary row
  var summaryRow = '<tr><td><strong>Avg pace</strong></td>' + selected.map(function(r){
    var ps = paceToSecs(r.pace);
    var isBest = ps === bestPaceSecs;
    return '<td class="num' + (isBest ? ' bv' : '') + '">' + r.pace + '/km</td>';
  }).join('') + '</tr>';

  // Per-km rows
  var splitRows = '';
  for (var k = 0; k < maxKm; k++) {
    // Collect this km's pace from each race
    var paces = raceSplits.map(function(rs){
      if (!rs || !rs.laps[k]) return null;
      var lap = rs.laps[k];
      return lap.pace ? paceToSecs(lap.pace) : null;
    });
    var validPaces = paces.filter(function(p){ return p != null; });
    var bestKm = validPaces.length ? Math.min.apply(null, validPaces) : null;
    var cells = paces.map(function(ps, i) {
      if (ps == null) return '<td class="num" style="color:var(--t3)"> - </td>';
      var lap = raceSplits[i].laps[k];
      var isBest = ps === bestKm;
      return '<td class="num' + (isBest ? ' bv' : '') + '">' + (lap.pace || ' - ') + '</td>';
    }).join('');
    splitRows += '<tr><td>km ' + (k + 1) + '</td>' + cells + '</tr>';
  }

  return '<div class="race-cmp-panel">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div class="sec-h" style="margin:0">Race comparison</div>' +
      '<button class="race-cmp-clear">Clear all</button>' +
    '</div>' +
    '<div class="race-cmp-grid">' + headerCols + '</div>' +
    (maxKm > 0 ? '<table class="race-cmp-tab"><thead>' + thead + '</thead><tbody>' + summaryRow + splitRows + '</tbody></table>'
               : '<div class="race-cmp-empty">No split data available for these races.</div>') +
  '</div>';
}

function renderRaces() {
  var filtered = curDist === 'all' ? races : races.filter(function(r) { return r.cat === curDist; });
  var sorted = filtered.slice().sort(function(a, b) { return b.ds > a.ds ? 1 : -1; });

  // === HERO SECTION ===
  var pbCount = 0;
  var distCounts = {};
  races.forEach(function(r) {
    distCounts[r.cat] = (distCounts[r.cat] || 0) + 1;
    if (bestByDist[r.cat] && Math.abs(r.timeSecs - bestByDist[r.cat]) < 1) pbCount++;
  });
  var distColors = { '5k':'#0d8c54', '10k':'#1e6cc0', '15k':'#6a4ec8', '21k':'#c06c1c', '42k':'#d32828' };
  var distChips = '';
  ['5k','10k','15k','21k','42k'].forEach(function(d) {
    if (distCounts[d]) distChips += '<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;background:' + distColors[d] + '15;color:' + distColors[d] + '">' + (d === '21k' ? 'Half' : d.toUpperCase()) + ' <span class="mono" style="opacity:.7">' + distCounts[d] + '</span></span>';
  });

  // Pace timeline chart (all races chronologically)
  var chronoAll = races.slice().sort(function(a, b) { return a.ds > b.ds ? 1 : -1; });
  var paceTimelineHtml = '';
  if (chronoAll.length >= 3) {
    var ptW = 680, ptH = 100, ptPadL = 36, ptPadB = 22, ptPadT = 14;
    var ptPaces = chronoAll.map(function(r) { return paceToSecs(r.pace) || 0; });
    var ptMin = Math.min.apply(null, ptPaces) - 10;
    var ptMax = Math.max.apply(null, ptPaces) + 10;
    var ptRange = ptMax - ptMin || 1;
    function ptX(i) { return ptPadL + (i / Math.max(chronoAll.length - 1, 1)) * (ptW - ptPadL - 10); }
    function ptY(v) { return ptPadT + ((v - ptMin) / ptRange) * (ptH - ptPadT - ptPadB); }
    var ptLine = chronoAll.map(function(r, i) { return ptX(i) + ',' + ptY(paceToSecs(r.pace)); }).join(' ');
    var ptDots = chronoAll.map(function(r, i) {
      var ps = paceToSecs(r.pace);
      var isBest = bestByDist[r.cat] && Math.abs(r.timeSecs - bestByDist[r.cat]) < 1;
      var col = distColors[r.cat] || 'var(--t3)';
      return '<circle cx="' + ptX(i) + '" cy="' + ptY(ps) + '" r="' + (isBest ? '5' : '3.5') + '" fill="' + col + '"' + (isBest ? ' stroke="#fff" stroke-width="1.5"' : '') + '>' +
        '<title>' + r.name + ' (' + r.date + ') - ' + r.pace + '/km</title></circle>';
    }).join('');
    paceTimelineHtml = '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:16px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px">Race pace timeline</div>' +
      '<svg viewBox="0 0 ' + ptW + ' ' + ptH + '" style="width:100%;display:block" preserveAspectRatio="xMidYMid meet">' +
        '<polyline points="' + ptLine + '" fill="none" stroke="var(--grn)" stroke-width="1.5" opacity=".4"/>' +
        ptDots +
        '<text x="' + ptPadL + '" y="' + (ptH - 2) + '" fill="var(--t3)" font-size="8" font-family="JetBrains Mono">' + chronoAll[0].date + '</text>' +
        '<text x="' + (ptW - 10) + '" y="' + (ptH - 2) + '" fill="var(--t3)" font-size="8" font-family="JetBrains Mono" text-anchor="end">' + chronoAll[chronoAll.length-1].date + '</text>' +
        '<text x="' + (ptPadL - 3) + '" y="' + (ptY(ptMin) + 3) + '" fill="var(--t3)" font-size="7" font-family="JetBrains Mono" text-anchor="end">' + secsToTimeMS(Math.round(ptMin)) + '</text>' +
        '<text x="' + (ptPadL - 3) + '" y="' + (ptY(ptMax) + 3) + '" fill="var(--t3)" font-size="7" font-family="JetBrains Mono" text-anchor="end">' + secsToTimeMS(Math.round(ptMax)) + '</text>' +
      '</svg>' +
      '<div style="font-size:11px;color:var(--t3);margin-top:4px">Lower = faster. Dot size = PB. Color = distance category.</div>' +
    '</div>';
  }

  var heroHtml = '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">' +
    '<div class="st a"><div class="sl">Total races</div><div class="sv mono" style="font-size:24px">' + races.length + '</div></div>' +
    '<div class="st" style="border-color:var(--grn);background:linear-gradient(135deg,rgba(13,140,84,.04),var(--card))"><div class="sl">PBs set</div><div class="sv mono" style="font-size:24px;color:var(--grn)">' + pbCount + '</div></div>' +
    '<div class="st"><div class="sl">Distances</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">' + distChips + '</div></div>' +
  '</div>' + paceTimelineHtml;

  // Build tabs dynamically from actual race categories
  var raceCats = {};
  races.forEach(function(r) { raceCats[r.cat] = true; });
  var distOrder = ['5k','10k','15k','21k','30k','42k'];
  var activeTabs = ['all'].concat(distOrder.filter(function(c) { return raceCats[c]; }));
  var tabsHtml = '<div class="dtabs">' + activeTabs.map(function(c) {
    var label = c === 'all' ? 'All' : c === '21k' ? 'Half' : c.toUpperCase();
    return '<div class="dtab' + (c === curDist ? ' on' : '') + '" data-dist="' + c + '">' + label + '</div>';
  }).join('') + '</div>';

  // Compare toggle bar
  var compareBar = '<div class="race-cmp-bar">' +
    '<button class="race-cmp-toggle' + (raceCompareMode ? ' on' : '') + '">' + (raceCompareMode ? '✓ Compare on' : 'Compare races') + '</button>' +
    (raceCompareMode ?
      '<span class="race-cmp-hint">' +
        (raceCompareIds.length === 0 ? 'Tick 2–4 races below to compare' :
         raceCompareIds.length === 1 ? '1 selected - pick at least one more' :
         raceCompareIds.length + ' selected') +
      '</span>' +
      (raceCompareIds.length > 0 ? '<button class="race-cmp-clear">Clear</button>' : '')
    : '') +
  '</div>';

  var listHtml;
  if (!sorted.length) {
    listHtml = '<div class="empty">' + (curDist === '42k' ? 'No marathon yet - Cologne will be your first' : 'No races at this distance yet') + '</div>';
  } else {
    listHtml = sorted.map(function(r, idx) {
      var isBest = bestByDist[r.cat] && Math.abs(r.timeSecs - bestByDist[r.cat]) < 1;
      var allPaces = r.splits.map(function(s) { return s.secs; });
      var minP = Math.min.apply(null, allPaces);
      var maxP = Math.max.apply(null, allPaces);
      var avgP = (minP + maxP) / 2;

      var isChecked = raceCompareIds.indexOf(r.runId) !== -1;
      var compareBox = raceCompareMode ?
        '<input type="checkbox" class="race-cmp-check" data-runid="' + r.runId + '"' + (isChecked ? ' checked' : '') + '>' : '';
      // Distance chip class
      var catCls = r.cat ? ' cat-' + r.cat : '';
      var distChipCls = r.cat ? 'd' + r.cat : '';
      var distLabel = r.cat === '21k' ? 'Half' : r.cat === '42k' ? 'Marathon' : (r.cat || '').toUpperCase();
      // Mini sparkline from splits
      var sparkHtml = '';
      if (allPaces.length > 1 && maxP > minP) {
        sparkHtml = '<div class="rc-spark">' + allPaces.map(function(p) {
          var pct = 30 + ((maxP - p) / (maxP - minP)) * 70;
          var col = p <= avgP ? 'var(--grn)' : 'var(--org)';
          return '<div class="rc-spark-bar" style="height:' + pct + '%;background:' + col + ';opacity:.7"></div>';
        }).join('') + '</div>';
      }
      return '<div class="rc' + (isBest ? ' best' : '') + catCls + (raceCompareMode ? ' rc-cmp-mode' : '') + '" data-race="' + idx + '" style="position:relative">' +
        compareBox +
        '<div class="rc-head"' + (raceCompareMode ? ' style="cursor:default"' : '') + '>' +
          '<div class="rc-top"><div class="rc-name">' + (isBest ? '<span class="badge">PB</span>' : '') + '<span class="rc-dist-chip ' + distChipCls + '">' + distLabel + '</span>' + r.name + '</div><div style="display:flex;align-items:center;gap:10px' + (raceCompareMode ? ';margin-right:32px' : '') + '"><div class="rc-date">' + r.date + '</div><span class="rc-chevron">\u25BE</span></div></div>' +
          '<div class="rc-stats">' +
            '<div class="mn"><div class="mnl">Time</div><div class="mnv mono' + (isBest ? ' hl' : '') + '">' + r.time + '</div></div>' +
            '<div class="mn"><div class="mnl">Pace</div><div class="mnv mono">' + r.pace + '/km</div></div>' +
            '<div class="mn"><div class="mnl">Avg HR</div><div class="mnv mono">' + (r.hr || '--') + '</div></div>' +
            '<div class="mn"><div class="mnl">Max HR</div><div class="mnv mono">' + (r.mhr || '--') + '</div></div>' +
            sparkHtml +
          '</div>' +
        '</div>' +
        '<div class="rc-body">' +
          '<div style="margin-top:10px;margin-bottom:6px"><button class="rc-view-btn" data-raceidx="' + idx + '" style="background:var(--grn);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">View full details</button></div>' +
          '<div class="rc-stats" style="margin-top:14px">' +
            (r.cad ? '<div class="mn"><div class="mnl">Cadence</div><div class="mnv mono">' + r.cad + ' spm</div></div>' : '') +
            (r.stride ? '<div class="mn"><div class="mnl">Stride</div><div class="mnv mono">' + r.stride + 'm</div></div>' : '') +
            (r.gct ? '<div class="mn"><div class="mnl">GCT</div><div class="mnv mono">' + r.gct + 'ms</div></div>' : '') +
            (r.pw ? '<div class="mn"><div class="mnl">Power</div><div class="mnv mono">' + r.pw + 'W</div></div>' : '') +
          '</div>' +
          (function() {
            // Try real Strava laps first
            var dayEntries = LAPS_DATA[r.ds];
            var realLaps = null;
            if (dayEntries && dayEntries.length) {
              var best = dayEntries[0], bestDiff = Math.abs((dayEntries[0].dist_km||0) - r.dist);
              for (var di = 1; di < dayEntries.length; di++) {
                var diff = Math.abs((dayEntries[di].dist_km||0) - r.dist);
                if (diff < bestDiff) { bestDiff = diff; best = dayEntries[di]; }
              }
              if (best.laps && best.laps.length > 0) realLaps = best.laps.filter(function(l){ return l.dist >= 0.2; });
            }
            if (realLaps && realLaps.length > 0) {
              var lapPaces = realLaps.map(function(l){ return l.pace ? paceToSecs(l.pace) : null; }).filter(Boolean);
              var minLP = lapPaces.length ? Math.min.apply(null,lapPaces) : 0;
              var maxLP = lapPaces.length ? Math.max.apply(null,lapPaces) : 0;
              var avgPaceS = paceToSecs(r.pace);
              return '<div class="splits"><div class="splits-h">km Splits <span style="font-weight:400;color:var(--grn);font-size:9px;text-transform:none;letter-spacing:0">&#x2713; Strava</span></div>' +
                realLaps.map(function(lap, i) {
                  var ps = lap.pace ? paceToSecs(lap.pace) : avgPaceS;
                  var pct = 30 + ((maxLP - ps) / (maxLP - minLP || 1)) * 60;
                  var cls = ps <= (avgPaceS||ps) ? 'split-fast' : ps <= (avgPaceS||ps) + 20 ? 'split-avg' : 'split-slow';
                  var distLabel = lap.dist >= 0.9 && lap.dist <= 1.1 ? 'km ' + lap.n : lap.dist.toFixed(1) + 'k';
                  var timeStr = lap.time ? ' (' + Math.floor(lap.time/60) + ':' + (lap.time%60<10?'0':'') + (lap.time%60) + ')' : '';
                  return '<div class="split-row">' +
                    '<div class="split-km">' + distLabel + '</div>' +
                    '<div class="split-bar ' + cls + '" style="width:' + pct + '%">' + (lap.pace||'–') + '/km' + timeStr + '</div>' +
                  '</div>';
                }).join('') +
              '</div>';
            }
            // Fallback: estimated (labelled clearly)
            var minP2 = Math.min.apply(null,r.splits.map(function(s){return s.secs;}));
            var maxP2 = Math.max.apply(null,r.splits.map(function(s){return s.secs;}));
            return '<div class="splits"><div class="splits-h" style="color:var(--t3)">No lap data available for this race</div></div>';
          })() +
        '</div>' +
      '</div>';
    }).join('');
  }

  // Progression chart
  var progHtml = '';
  if (curDist !== 'all' && filtered.length > 1) {
    var chrono = filtered.slice().sort(function(a, b) { return a.ds > b.ds ? 1 : -1; });
    var maxM = Math.max.apply(null, chrono.map(function(r) { return r.timeSecs; }));
    var minM = Math.min.apply(null, chrono.map(function(r) { return r.timeSecs; }));
    var rng = maxM - minM || 1;
    progHtml = '<div class="prog"><div class="sec-h">' + curDist + ' time progression</div><div class="prog-bars">' +
      chrono.map(function(r) {
        var pct = 25 + ((maxM - r.timeSecs) / rng) * 65;
        var isBest = Math.abs(r.timeSecs - bestByDist[r.cat]) < 1;
        return '<div class="prog-item"><div class="prog-val mono' + (isBest ? ' hl' : '') + '">' + r.time + '</div><div class="prog-bar" style="height:' + pct + '%;background:var(--grd1);opacity:' + (isBest ? '1' : '.3') + '"></div><div class="prog-lbl">' + r.date + '</div></div>';
      }).join('') +
    '</div></div>';
  }

  document.getElementById('pg-races').innerHTML = heroHtml + compareBar + tabsHtml + listHtml + progHtml + (raceCompareMode ? renderRaceCompare() : '');
}
renderRaces();

document.getElementById('pg-races').addEventListener('click', function(e) {
  // Compare toggle button
  var cmpToggle = e.target.closest('.race-cmp-toggle');
  if (cmpToggle) {
    raceCompareMode = !raceCompareMode;
    if (!raceCompareMode) raceCompareIds = [];
    renderRaces();
    return;
  }
  // Compare clear button
  var cmpClear = e.target.closest('.race-cmp-clear');
  if (cmpClear) {
    raceCompareIds = [];
    renderRaces();
    return;
  }
  // Compare checkbox on race card
  var cmpCheck = e.target.closest('.race-cmp-check');
  if (cmpCheck) {
    e.stopPropagation();
    var rid = parseInt(cmpCheck.dataset.runid, 10);
    var pos = raceCompareIds.indexOf(rid);
    if (pos >= 0) {
      raceCompareIds.splice(pos, 1);
    } else if (raceCompareIds.length < 4) {
      raceCompareIds.push(rid);
    } else {
      // Cap reached - uncheck the input visually
      cmpCheck.checked = false;
      return;
    }
    renderRaces();
    return;
  }

  var tab = e.target.closest('.dtab');
  if (tab) { curDist = tab.dataset.dist; renderRaces(); return; }
  // "View run" button opens run details modal
  var viewBtn = e.target.closest('.rc-view-btn');
  if (viewBtn) {
    e.stopPropagation();
    var raceIdx = parseInt(viewBtn.dataset.raceidx, 10);
    var filtered = curDist === 'all' ? races : races.filter(function(r) { return r.cat === curDist; });
    var sorted = filtered.slice().sort(function(a, b) { return b.ds > a.ds ? 1 : -1; });
    if (sorted[raceIdx] && sorted[raceIdx].runId != null) {
      showRunDetailsModal(sorted[raceIdx].runId);
    }
    return;
  }
  // In compare mode, head clicks shouldn't expand the card
  if (raceCompareMode) return;
  var head = e.target.closest('.rc-head');
  if (head) { head.parentElement.classList.toggle('open'); }
});

function renderCalendar() {
  var today = new Date(); today.setHours(0,0,0,0);

  // Filter state
  var distFilter = window.__calDist || 'all';
  var travelFilter = window.__calTravel || 'all';

  function matchesDist(r) {
    if (distFilter === 'all') return true;
    return r.dist === distFilter;
  }
  function matchesTravel(r) {
    if (travelFilter === 'all') return true;
    return r.cat === travelFilter;
  }

  function distClass(d) {
    if (d === 'Marathon') return 'marathon';
    if (d === 'Half') return 'half';
    if (d === '10K') return 'tenK';
    if (d === '5K') return 'fiveK';
    if (d === '15K') return 'fifteenK';
    return '';
  }

  function parseRaceDate(ds) {
    if (ds && ds.indexOf('TBA') === 0) return null;
    return new Date(ds);
  }

  function daysTo(ds) {
    var d = parseRaceDate(ds); if (!d) return null;
    return Math.ceil((d - today) / (1000 * 60 * 60 * 24));
  }

  function fmtDate(ds) {
    if (ds && ds.indexOf('TBA') === 0) {
      var parts = ds.replace('TBA-','').split('-');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return 'TBA - ' + (months[parseInt(parts[1],10)-1] || '?') + ' ' + parts[0];
    }
    var d = new Date(ds);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    return dow + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function cdChip(ds) {
    var d = daysTo(ds);
    if (d == null) return '';
    if (d < 0) return '<span class="cal-card-cd past">' + Math.abs(d) + 'd ago</span>';
    if (d === 0) return '<span class="cal-card-cd imminent">TODAY</span>';
    if (d <= 7) return '<span class="cal-card-cd imminent">' + d + 'd</span>';
    if (d <= 30) return '<span class="cal-card-cd soon">' + d + 'd</span>';
    return '<span class="cal-card-cd">' + d + 'd</span>';
  }

  function regTag(r) {
    var rs = r.registrationStatus || 'unknown';
    var label = { open:'Open', closed:r.status==='confirmed'?'Registered':'Closed', ballot:'Ballot', upcoming:'Soon', unknown:'' }[rs] || '';
    var cls = { open:'reg-open', closed:r.status==='confirmed'?'registered':'reg-closed', ballot:'reg-ballot', upcoming:'reg-upcoming', unknown:'' }[rs] || '';
    if (!label) return '';
    return '<span class="cal-card-tag ' + cls + '">' + label + '</span>';
  }

  function cardHtml(r) {
    var hasStrat = raceStrategies[r.date] && daysTo(r.date) >= 0;
    var cls = 'cal-card ' + r.status + (hasStrat ? ' has-strat' : '');
    var link = r.url ? '<a class="cal-card-link" href="' + r.url + '" target="_blank" rel="noopener">Info \u2192</a>' : '';
    var stratHint = '';
    if (hasStrat) {
      var s = raceStrategies[r.date];
      stratHint = '<div class="cal-card-strat-hint" data-strat-date="' + r.date + '">' +
        '\u{1F3AF} Race strategy: ' + s.goalA.time + ' (A) / ' + s.goalB.time + ' (B) - tap to view</div>';
    }
    return '<div class="' + cls + '"' + (hasStrat ? ' data-strat-date="' + r.date + '"' : '') + '>' +
      '<div class="cal-card-top">' +
        '<div class="cal-card-dateline">' +
          '<span class="cal-card-date">' + fmtDate(r.date) + '</span>' +
          cdChip(r.date) +
        '</div>' +
        '<span class="cal-card-dist ' + distClass(r.dist) + '">' + r.dist + '</span>' +
      '</div>' +
      '<div>' +
        '<div class="cal-card-name">' + r.name + '</div>' +
        '<div class="cal-card-loc">\uD83D\uDCCD ' + r.location + '</div>' +
      '</div>' +
      stratHint +
      (r.notes ? '<div class="cal-card-notes">' + r.notes + '</div>' : '') +
      '<div class="cal-card-foot">' +
        '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">' +
          regTag(r) +
          (r.registrationOpens && r.registrationStatus !== 'closed' ? '<span class="cal-card-reg">' + r.registrationOpens + '</span>' : '') +
        '</div>' +
        link +
      '</div>' +
    '</div>';
  }

  // Partition
  var all = raceCalendar.filter(function(r) { return matchesDist(r) && matchesTravel(r); });
  // Sort by date (TBA last)
  all.sort(function(a, b) {
    var aTba = (a.date || '').indexOf('TBA') === 0;
    var bTba = (b.date || '').indexOf('TBA') === 0;
    if (aTba && !bTba) return 1;
    if (!aTba && bTba) return -1;
    return a.date < b.date ? -1 : 1;
  });

  // Find hero: next confirmed future race
  var hero = raceCalendar.filter(function(r) {
    var d = daysTo(r.date); return d != null && d >= 0 && r.status === 'confirmed';
  }).sort(function(a, b) { return daysTo(a.date) - daysTo(b.date); })[0];

  var heroHtml = '';
  if (hero) {
    heroHtml = '<div class="cal-hero">' +
      '<div class="cal-hero-l">' +
        '<div class="cal-hero-lbl">Next up</div>' +
        '<div class="cal-hero-name">' + hero.name + ' \u00B7 ' + hero.dist + '</div>' +
        '<div class="cal-hero-meta">' + fmtDate(hero.date) + ' \u00B7 ' + hero.location + '</div>' +
      '</div>' +
      '<div class="cal-hero-r">' +
        '<div class="cal-hero-cd">' + daysTo(hero.date) + '</div>' +
        '<div class="cal-hero-cdlbl">days to go</div>' +
      '</div>' +
    '</div>';
  }

  // Filter chips
  var distOpts = ['all','5K','10K','15K','Half','Marathon'];
  var travelOpts = [['all','All'],['near','Near Valencia'],['spain','Spain'],['international','International']];

  var filterHtml = '<div class="cal-filter">' +
    '<span class="cal-filter-lbl">Distance</span>' +
    '<div class="cal-filter-group">' +
      distOpts.map(function(d) {
        return '<button class="cal-chip' + (d === distFilter ? ' on' : '') + '" data-caldist="' + d + '">' + (d === 'all' ? 'All' : d) + '</button>';
      }).join('') +
    '</div>' +
    '<span class="cal-filter-lbl" style="margin-left:12px">Region</span>' +
    '<div class="cal-filter-group">' +
      travelOpts.map(function(o) {
        return '<button class="cal-chip' + (o[0] === travelFilter ? ' on' : '') + '" data-caltravel="' + o[0] + '">' + o[1] + '</button>';
      }).join('') +
    '</div>' +
  '</div>';

  // Group into sections by status/cat
  var confirmed = all.filter(function(r) { return r.status === 'confirmed'; });
  var possibilities = all.filter(function(r) { return r.status === 'possibility'; });
  var bucketNear = all.filter(function(r) { return r.status === 'bucket' && r.cat === 'near'; });
  var bucketSpain = all.filter(function(r) { return r.status === 'bucket' && r.cat === 'spain'; });
  var bucketIntl = all.filter(function(r) { return r.status === 'bucket' && r.cat === 'international'; });

  function section(title, list, emptyMsg) {
    if (!list.length) return emptyMsg ? '<div class="cal-section-h">' + title + '</div><div class="empty" style="padding:30px;font-size:13px">' + emptyMsg + '</div>' : '';
    return '<div class="cal-section-h">' + title + '<span class="cal-count">' + list.length + '</span></div>' +
      '<div class="cal-grid">' + list.map(cardHtml).join('') + '</div>';
  }

  var body = filterHtml +
    heroHtml +
    section('Confirmed - I\u2019m running these', confirmed) +
    section('Possibilities', possibilities) +
    section('Near Valencia - bucket list', bucketNear) +
    section('Spain - bucket list', bucketSpain) +
    section('International - bucket list', bucketIntl);

  if (!all.length) body += '<div class="empty">No races match the current filters.</div>';

  // Next confirmed race strip
  var upcoming = raceCalendar.filter(function(r) {
    if (r.status !== 'confirmed') return false;
    var d = parseRaceDate(r.date);
    return d && d >= today;
  }).sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
  var nextStrip = '';
  if (upcoming.length) {
    var nx = upcoming[0];
    var nd = daysTo(nx.date);
    var urgColor = nd <= 7 ? 'var(--red)' : nd <= 30 ? 'var(--org)' : 'var(--grn)';
    nextStrip = '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px">' +
      '<div style="display:flex;align-items:center;gap:14px">' +
        '<div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--t3)">Next race</div>' +
        '<div>' +
          '<div style="font-size:15px;font-weight:800;color:var(--t1)">' + nx.name + '</div>' +
          '<div style="font-size:11px;color:var(--t3);margin-top:2px">' + fmtDate(nx.date) + ' &bull; ' + nx.dist + '</div>' +
        '</div>' +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0">' +
        '<div style="font-family:\'JetBrains Mono\';font-size:32px;font-weight:800;color:' + urgColor + ';line-height:1">' + nd + '</div>' +
        '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700;margin-top:2px">days</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('pg-calendar').innerHTML = nextStrip + body;
}
renderCalendar();

// Race strategy modal renderer
function showRaceStrategy(dateKey) {
  var s = raceStrategies[dateKey];
  if (!s) return;
  var rc = raceCalendar.filter(function(r) { return r.date === dateKey; })[0];
  var raceName = rc ? rc.name : s.race;
  // Inline date formatting (fmtDate is scoped inside renderCalendar)
  var raceDate = dateKey;
  if (rc && rc.date && rc.date.indexOf('TBA') !== 0) {
    var _d = new Date(rc.date);
    var _months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var _dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][_d.getDay()];
    raceDate = _dow + ' ' + _d.getDate() + ' ' + _months[_d.getMonth()] + ' ' + _d.getFullYear();
  }
  var raceLoc = rc ? rc.location : '';

  // Build splits table
  var splitsRows = s.splits.map(function(sp, i) {
    var isLast = i === s.splits.length - 1;
    return '<tr>' +
      '<td class="km-label">' + (typeof sp.km === 'number' ? 'km ' + sp.km : 'km ' + sp.km) + '</td>' +
      '<td class="col-a">' + sp.a + '</td>' +
      '<td class="col-b">' + sp.b + '</td>' +
      '<td class="split-note">' + sp.note + '</td>' +
    '</tr>';
  }).join('');

  var html = '<div class="strat-overlay" id="strat-overlay">' +
    '<div class="strat-modal">' +
      '<div class="strat-modal-head">' +
        '<h2>' + raceName + ' - ' + s.dist + '</h2>' +
        '<div class="strat-meta">' + raceDate + (raceLoc ? ' - ' + raceLoc : '') + '</div>' +
        '<button class="strat-modal-close" id="strat-close">×</button>' +
      '</div>' +
      '<div class="strat-body">' +
        '<div class="strat-goals">' +
          '<div class="strat-goal goal-a">' +
            '<div class="strat-goal-label">' + s.goalA.label + '</div>' +
            '<div class="strat-goal-time">' + s.goalA.time + '</div>' +
            '<div class="strat-goal-pace">' + s.goalA.pace + '</div>' +
            '<div class="strat-goal-desc">' + s.goalA.desc + '</div>' +
          '</div>' +
          '<div class="strat-goal goal-b">' +
            '<div class="strat-goal-label">' + s.goalB.label + '</div>' +
            '<div class="strat-goal-time">' + s.goalB.time + '</div>' +
            '<div class="strat-goal-pace">' + s.goalB.pace + '</div>' +
            '<div class="strat-goal-desc">' + s.goalB.desc + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="strat-section-h">Per-km race plan</div>' +
        '<table class="strat-splits">' +
          '<thead><tr><th>Split</th><th>A Goal</th><th>B Goal</th><th>Notes</th></tr></thead>' +
          '<tbody>' + splitsRows + '</tbody>' +
        '</table>' +
        '<div class="strat-section-h">Race strategy</div>' +
        '<div class="strat-tip">' + s.strategy + '</div>' +
        (s.coaching ? '<div class="strat-section-h">Coach says</div><div class="strat-coach"><div class="strat-coach-h">Your analysis</div>' + s.coaching + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div>';

  // Remove existing overlay if any
  var existing = document.getElementById('strat-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);

  // Close handlers
  document.getElementById('strat-close').addEventListener('click', function() {
    document.getElementById('strat-overlay').remove();
  });
  document.getElementById('strat-overlay').addEventListener('click', function(ev) {
    if (ev.target === this) this.remove();
  });
}
window.showRaceStrategy = showRaceStrategy;

document.getElementById('pg-calendar').addEventListener('click', function(e) {
  // Race strategy click
  var stratCard = e.target.closest('[data-strat-date]');
  if (stratCard && !e.target.closest('a')) {
    showRaceStrategy(stratCard.dataset.stratDate);

// ===== INTERVALS PAGE (Redesigned) =====
var selInts = {};
var compareMode = false;
var openInts = {};

function renderIntPage() {
  // === HERO SECTION: best-rep progression chart ===
  var intHeroHtml = '';
  var chronoInts = ints.slice().sort(function(a, b) { return a.ds > b.ds ? 1 : -1; });
  var bestPaces = chronoInts.filter(function(i) { return i.best; }).map(function(i) { return { ds: i.ds, date: i.date, title: i.title, pace: paceToSecs(i.best) }; });

  if (bestPaces.length >= 3) {
    // Stats
    var fastestEver = Math.min.apply(null, bestPaces.map(function(b) { return b.pace; }));
    var recentBest = bestPaces.slice(-3);
    var avgRecent = Math.round(recentBest.reduce(function(s,b) { return s + b.pace; }, 0) / recentBest.length);
    // Chart
    var ipW = 680, ipH = 100, ipPadL = 36, ipPadB = 20, ipPadT = 12;
    var ipPaces = bestPaces.map(function(b) { return b.pace; });
    var ipMin = Math.min.apply(null, ipPaces) - 5;
    var ipMax = Math.max.apply(null, ipPaces) + 5;
    var ipRange = ipMax - ipMin || 1;
    function ipX(i) { return ipPadL + (i / Math.max(bestPaces.length - 1, 1)) * (ipW - ipPadL - 10); }
    function ipY(v) { return ipPadT + ((v - ipMin) / ipRange) * (ipH - ipPadT - ipPadB); }
    var ipLinePts = bestPaces.map(function(b, i) { return ipX(i) + ',' + ipY(b.pace); }).join(' ');
    var ipArea = 'M' + ipX(0) + ',' + ipY(bestPaces[0].pace);
    bestPaces.forEach(function(b, i) { ipArea += ' L' + ipX(i) + ',' + ipY(b.pace); });
    ipArea += ' L' + ipX(bestPaces.length-1) + ',' + (ipH - ipPadB) + ' L' + ipX(0) + ',' + (ipH - ipPadB) + ' Z';
    var ipDots = bestPaces.map(function(b, i) {
      var isFastest = b.pace <= fastestEver + 1;
      return '<circle cx="' + ipX(i) + '" cy="' + ipY(b.pace) + '" r="' + (isFastest ? '5' : '3') + '" fill="' + (isFastest ? 'var(--grn)' : 'var(--red)') + '"' + (isFastest ? ' stroke="#fff" stroke-width="1.5"' : ' opacity=".7"') + '>' +
        '<title>' + b.date + ': ' + secsToTimeMS(Math.round(b.pace)) + '/km</title></circle>';
    }).join('');

    intHeroHtml = '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">' +
      '<div class="st a"><div class="sl">Sessions</div><div class="sv mono" style="font-size:24px">' + ints.length + '</div></div>' +
      '<div class="st" style="border-color:var(--grn);background:linear-gradient(135deg,rgba(13,140,84,.04),var(--card))"><div class="sl">Fastest rep ever</div><div class="sv mono" style="font-size:24px;color:var(--grn)">' + secsToTimeMS(Math.round(fastestEver)) + '<span style="font-size:12px;color:var(--t3)">/km</span></div></div>' +
      '<div class="st"><div class="sl">Last 3 avg</div><div class="sv mono" style="font-size:24px">' + secsToTimeMS(avgRecent) + '<span style="font-size:12px;color:var(--t3)">/km</span></div></div>' +
    '</div>' +
    '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:16px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px">Best rep pace progression</div>' +
      '<svg viewBox="0 0 ' + ipW + ' ' + ipH + '" style="width:100%;display:block" preserveAspectRatio="xMidYMid meet">' +
        '<path d="' + ipArea + '" fill="var(--red)" opacity=".06"/>' +
        '<polyline points="' + ipLinePts + '" fill="none" stroke="var(--red)" stroke-width="2" opacity=".6"/>' +
        ipDots +
        '<text x="' + ipPadL + '" y="' + (ipH - 2) + '" fill="var(--t3)" font-size="8" font-family="JetBrains Mono">' + bestPaces[0].date + '</text>' +
        '<text x="' + (ipW - 10) + '" y="' + (ipH - 2) + '" fill="var(--t3)" font-size="8" font-family="JetBrains Mono" text-anchor="end">' + bestPaces[bestPaces.length-1].date + '</text>' +
        '<text x="' + (ipPadL - 3) + '" y="' + (ipY(ipMin) + 3) + '" fill="var(--t3)" font-size="7" font-family="JetBrains Mono" text-anchor="end">' + secsToTimeMS(Math.round(ipMin)) + '</text>' +
        '<text x="' + (ipPadL - 3) + '" y="' + (ipY(ipMax) + 3) + '" fill="var(--t3)" font-size="7" font-family="JetBrains Mono" text-anchor="end">' + secsToTimeMS(Math.round(ipMax)) + '</text>' +
      '</svg>' +
      '<div style="font-size:11px;color:var(--t3);margin-top:4px">Lower = faster. Green dots = all-time best reps.</div>' +
    '</div>';
  }

  // Toolbar with count + compare toggle
  var toolbarHtml = '<div class="int-toolbar">' +

    // Expandable detail body (only in non-compare mode)
    // Rep splits visualization
    var repsHtml = '';
    if (i.repData && i.repData.reps.length > 0) {

      '</div>' +
      repsHtml +
    '</div>';

    return '<div class="' + cardClass + '">' + headHtml + bodyHtml + '</div>';
  }).join('');

  // Comparison table (only when 2+ selected in compare mode)
  var cmpHtml = '';
  if (compareMode && selCount >= 2) {
    var sel = ints.filter(function(i) { return selInts[i.id]; }).sort(function(a, b) { return a.ds > b.ds ? 1 : -1; });
    var bests = sel.map(function(s) { return s.best ? paceToSecs(s.best) : 9999; });
    var bestIdx = bests.indexOf(Math.min.apply(null, bests));
    var fields = [
      {k:'dist',l:'Distance',f:function(v){return v+'km'}},

      {k:'hr',l:'Avg HR',f:function(v){return v+' bpm'}},
      {k:'mhr',l:'Max HR',f:function(v){return v+' bpm'}},
      {k:'cad',l:'Cadence',f:function(v){return v+' spm'}},

    ];
    cmpHtml = '<div class="cmp show"><div class="cmp-h">Side by side comparison <button id="show-reps-btn" style="float:right;padding:4px 12px;background:var(--grn);color:white;border:none;border-radius:4px;font-weight:700;font-size:11px;cursor:pointer">Show Rep Details</button></div>' +
      '<div style="overflow-x:auto"><table class="ct"><tr><th></th>' +
      sel.map(function(s, si) {
        return '<th class="' + (si === bestIdx ? 'best' : '') + '">' + s.title + '<br><span style="font-weight:400;font-size:9px;opacity:.6">' + s.date + '</span></th>';
      }).join('') + '</tr>' +
      fields.filter(function(f) { return sel.some(function(s) { return s[f.k] != null; }); }).map(function(f) {
        // Find best value per row
        var rowVals = sel.map(function(s) {
          if (f.k === 'best' || f.k === 'pace') return s[f.k] ? paceToSecs(s[f.k]) : 9999;
          if (f.k === 'time') return s.timeSecs || 9999;
          return null;
        });
        var rowBestIdx = -1;
        if (f.k === 'best' || f.k === 'pace' || f.k === 'time') {
          var rowMin = Math.min.apply(null, rowVals.filter(function(v){return v < 9999;}));
          rowBestIdx = rowVals.indexOf(rowMin);
        }
        return '<tr><td>' + f.l + '</td>' + sel.map(function(s, si) {
          var isBest = si === rowBestIdx;
          return '<td class="' + (isBest ? 'bv' : '') + '">' + (s[f.k] != null ? f.f(s[f.k]) : ' - ') + '</td>';
        }).join('') + '</tr>';
      }).join('') + '</table></div></div>';
  }

  document.getElementById('pg-intervals').innerHTML = intHeroHtml + toolbarHtml + hintHtml + listHtml + cmpHtml;
}

// Parse week date ranges from "Week N (Mon D–D)" strings → {start, end} Date objects
var planMonths = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function parsePlanWeekDates(wk) {
  // Match patterns: "(Apr 3–6)", "(Sep 29–Oct 4)", "(Jul 1–13)"
  var m = wk.match(/\((\w+)\s+(\d+)\s*[\u2013\-]\s*(?:(\w+)\s+)?(\d+)\)/);
  if (!m) return null;
  var sm = planMonths[m[1]], sd = parseInt(m[2]);
  var em = m[3] ? planMonths[m[3]] : sm, ed = parseInt(m[4]);
  var yr = 2026;
  return { start: new Date(yr, sm, sd), end: new Date(yr, em, ed, 23, 59, 59) };
}

// Load checkbox state from localStorage
var planChecks = {};
try { planChecks = JSON.parse(localStorage.getItem('planChecks') || '{}'); } catch(e) {}
function savePlanChecks() { localStorage.setItem('planChecks', JSON.stringify(planChecks)); }

var planWkIdx = 0;
var todayDate = new Date(); todayDate.setHours(0,0,0,0);
document.getElementById('pg-plan').innerHTML = plan.map(function(p) {
  return '<div class="plan-phase"><div class="phase-h ' + p.cls + '">' + p.label + '</div>' +
    (planNotes[p.phase] ? '<div class="plan-phase-note">' + planNotes[p.phase] + '</div>' : '') +
    p.weeks.map(function(w) {
      var wi = planWkIdx++;
      var dates = parsePlanWeekDates(w.wk);
      var isPast = dates && todayDate > dates.end;
      var isCurrent = dates && todayDate >= dates.start && todayDate <= dates.end;
      var cls = 'pw' + (isPast ? ' pw-past' : '') + (isCurrent ? ' pw-current open' : '');
      var badge = isCurrent ? '<span class="pw-now-badge">This week</span>' : '';
      // Progress: count completed days
      var totalDays = w.days.filter(function(d){ return d.desc; }).length;
      var doneDays = w.days.reduce(function(n, d, di) { return n + (planChecks[wi + '-' + di] ? 1 : 0); }, 0);
      var pct = totalDays > 0 ? Math.round(doneDays / totalDays * 100) : 0;
      var progressHtml = totalDays > 0 ? '<div class="pw-progress"><div class="pw-progress-fill" style="width:' + pct + '%"></div></div>' : '';
      return '<div class="' + cls + '" data-pwi="' + wi + '"><div class="pw-head"><span class="pw-label">' + w.wk + badge + '</span><span class="pw-vol">' + progressHtml + w.vol + '</span></div>' +
        '<div class="pw-body">' + w.days.map(function(d, di) {
          var chkKey = wi + '-' + di;
          var done = planChecks[chkKey];
          return '<div class="pd"><div class="pd-chk' + (done ? ' done' : '') + '" data-chk="' + chkKey + '"></div><span class="pd-d">' + d.d + '</span><span class="pd-t ' + d.c + '">' + d.t + '</span><span class="pd-desc">' + (done ? '<s>' + d.desc + '</s>' : d.desc) + '</span></div>';
        }).join('') + '</div></div>';
    }).join('') +
  '</div>';
}).join('');

document.getElementById('pg-plan').addEventListener('click', function(e) {

  var chk = e.target.closest('.pd-chk');
  if (chk) {

    planChecks[key] = !planChecks[key];
    savePlanChecks();
    chk.classList.toggle('done');
    var desc = chk.closest('.pd').querySelector('.pd-desc');

  if (pw) pw.classList.toggle('open');
});

function renderAllRunsTab() {
  var pg = document.getElementById('pg-weekly');
  if (!allRuns || allRuns.length === 0) {
    pg.innerHTML = '<p style="padding:40px;text-align:center;color:var(--t3)">No runs available</p>';
    return;
  }

  // Badge class from title
  function badgeClass(title) {
    var t = title.toLowerCase();
    if (/race|parkrun/.test(t)) return 'race';
    if (/interval|fartlek|hill rep/.test(t)) return 'intervals';
    if (/tempo|threshold|progressive|benchmark/.test(t)) return 'tempo';
    if (/long run|long -/.test(t) || /long\s*run/.test(t)) return 'long';
    if (/recovery/.test(t)) return 'recovery';
    if (/moderate/.test(t)) return 'moderate';
    if (/steady/.test(t)) return 'steady';
    if (/fast/.test(t)) return 'fast';
    return 'easy';
  }

  function badgeLabel(title) {
    var t = title.toLowerCase();
    if (/race/.test(t)) return 'Race';
    if (/parkrun/.test(t)) return 'Parkrun';
    if (/interval|fartlek/.test(t)) return 'Intervals';
    if (/hill rep/.test(t)) return 'Hills';
    if (/tempo|threshold/.test(t)) return 'Tempo';
    if (/progressive/.test(t)) return 'Progr.';
    if (/long/.test(t)) return 'Long';
    if (/recovery/.test(t)) return 'Recovery';
    return 'Easy';
  }

  // Seeded random for consistent estimated splits
  function seededRand(seed) {
    var s = seed;
    return function() { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  }

  function estimateSplits(run) {
    var avgPaceSecs = paceToSecs(run.pace);
    if (!avgPaceSecs || avgPaceSecs <= 0) return null;
    var nKm = Math.ceil(run.dist);
    if (nKm < 1) return null;
    var seed = run.ds.replace(/-/g,'') * 1 + Math.round(run.dist * 100);
    var rnd = seededRand(seed);
    var splits = [];
    // Slight negative split tendency (start a little slower, finish faster)
    for (var i = 0; i < nKm; i++) {
      var pos = i / (nKm - 1 || 1); // 0=start, 1=finish
      var trend = (pos - 0.5) * -12; // up to ±6s per km trend
      var jitter = (rnd() - 0.5) * 20; // ±10s random noise
      splits.push(Math.round(avgPaceSecs + trend + jitter));
    }
    return splits;
  }

  function renderDetail(run) {
    var stats = [];
    stats.push({l:'Distance', v: run.dist.toFixed(2), u:'km'});
    stats.push({l:'Time', v: run.time, u:''});
    stats.push({l:'Avg Pace', v: run.pace || '–', u:'/km'});
    if (run.bestPace) stats.push({l:'Best Pace', v: run.bestPace, u:'/km'});
    if (run.hr) stats.push({l:'Avg HR', v: run.hr, u:'bpm'});
    if (run.mhr) stats.push({l:'Max HR', v: run.mhr, u:'bpm'});
    if (run.te) stats.push({l:'Aero TE', v: run.te, u:''});
    if (run.cad) stats.push({l:'Cadence', v: run.cad, u:'spm'});
    if (run.stride) stats.push({l:'Stride', v: run.stride, u:'m'});
    if (run.gct) stats.push({l:'GCT', v: run.gct, u:'ms'});
    if (run.pw) stats.push({l:'Power', v: run.pw, u:'W'});
    if (run.ascent) stats.push({l:'Ascent', v: run.ascent, u:'m'});
    if (run.cals) stats.push({l:'Calories', v: run.cals, u:'kcal'});
    if (run.steps) stats.push({l:'Steps', v: run.steps.toLocaleString(), u:''});

    var h = '<div class="rfi-stat-grid">';
    stats.forEach(function(s) {
      h += '<div class="rfi-stat-item"><div class="rfi-stat-lbl">' + s.l + '</div>' +
           '<div class="rfi-stat-val">' + s.v + ' <span class="rfi-stat-unit">' + s.u + '</span></div></div>';
    });
    h += '</div>';



    // Real Strava laps - look up by date, match by closest distance
    var realLaps = null;
    var stravaDesc = null;
    var dayEntries = LAPS_DATA[run.ds];
    if (dayEntries && dayEntries.length) {
      var best = dayEntries[0], bestDiff = Math.abs((dayEntries[0].dist_km || 0) - run.dist);
      for (var di = 1; di < dayEntries.length; di++) {
        var diff = Math.abs((dayEntries[di].dist_km || 0) - run.dist);
        if (diff < bestDiff) { bestDiff = diff; best = dayEntries[di]; }
      }
      if (best.laps && best.laps.length > 0) realLaps = best.laps;
      stravaDesc = best.desc || null;
    }

    var avgS = paceToSecs(run.pace);

    // Check if this is an interval session
    var isIntervalRun = (run.title || '').toLowerCase().indexOf('interval') >= 0 ||
                        /\dx\d/.test(run.title || '') ||
                        badgeClass(run.title) === 'intervals';

    // For interval runs: prefer description splits over raw Strava laps
    var descSplits = isIntervalRun ? parseDescSplits(stravaDesc) : null;

    if (descSplits) {
      // Show rep splits parsed from description
      h += '<div class="rfi-splits-h">Reps <span style="font-weight:400;color:var(--grn);font-size:9px;text-transform:none;letter-spacing:0">&#x2713; from Strava description</span></div>';
      var splitSecs = descSplits.map(paceToSecs);
      var minSp = Math.min.apply(null, splitSecs), maxSp = Math.max.apply(null, splitSecs);
      var rangeSp = maxSp - minSp || 1;
      h += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:4px">' +
           '<tr style="color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">' +
           '<th style="text-align:left;padding:5px 8px 5px 0;width:32px">#</th>' +
           '<th style="text-align:left;padding:5px 8px">Time</th>' +
           '<th style="padding:5px 8px;width:80px"></th>' +
           '</tr>';
      descSplits.forEach(function(t, i) {
        var ps = paceToSecs(t);
        var paceCol = ps && avgS ? (ps <= avgS ? 'var(--grn)' : ps <= avgS + 25 ? 'var(--org)' : 'var(--red)') : 'var(--grn)';
        // For interval reps the fastest is best (smallest seconds = widest bar)
        var barW = Math.round(12 + 68 * (maxSp - ps) / rangeSp);
        if (barW < 4) barW = 4; if (barW > 80) barW = 80;
        h += '<tr style="border-top:1px solid var(--bdr2)">' +
             '<td style="padding:6px 8px 6px 0;color:var(--t3);font-size:11px">Rep ' + (i+1) + '</td>' +
             '<td style="padding:6px 8px">' +
               '<span style="font-weight:700;color:' + paceCol + ';font-family:\'JetBrains Mono\',monospace;font-size:14px">' + t + '</span>' +
             '</td>' +
             '<td style="padding:6px 8px">' +
               '<div style="height:6px;border-radius:3px;width:' + barW + 'px;background:' + paceCol + ';opacity:.7"></div>' +
             '</td>' +
             '</tr>';
      });
      h += '</table>';
    } else if (realLaps) {
      // Filter out very short laps (< 200m) - those are usually button presses
      var validLaps = realLaps.filter(function(l) { return l.dist >= 0.2; });
      // Determine if interval session (laps vary a lot in pace) or km splits
      var lapPaces = validLaps.map(function(l) {
        return l.pace ? paceToSecs(l.pace) : null;
      }).filter(function(p) { return p && p > 0; });
      var isInterval = false;
      if (lapPaces.length >= 2) {
        var maxP = Math.max.apply(null, lapPaces), minP = Math.min.apply(null, lapPaces);
        isInterval = (maxP - minP) > 45;
      }
      // For interval runs with no desc splits, filter to just the fast laps
      if (isInterval && isIntervalRun) {
        // Keep only laps faster than avg pace - these are the reps
        var thresholdS = avgS ? avgS * 0.95 : null;
        if (thresholdS) {
          var repLaps = validLaps.filter(function(l) { return l.pace && paceToSecs(l.pace) < thresholdS; });
          if (repLaps.length >= 2) validLaps = repLaps;
        }
      }
      var heading = isInterval ? 'Reps / Splits' : 'km Splits';
      h += '<div class="rfi-splits-h">' + heading + ' <span style="font-weight:400;color:var(--grn);font-size:9px;text-transform:none;letter-spacing:0">&#x2713; Strava</span></div>';

      var allPaces = lapPaces.slice();
      var minS = allPaces.length ? Math.min.apply(null, allPaces) : (avgS || 300);
      var maxS2 = allPaces.length ? Math.max.apply(null, allPaces) : (avgS || 300);
      var range2 = maxS2 - minS || 1;
      h += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:4px">' +
           '<tr style="color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">' +
           '<th style="text-align:left;padding:5px 8px 5px 0;width:32px">#</th>' +
           '<th style="text-align:left;padding:5px 8px">Dist</th>' +
           '<th style="text-align:left;padding:5px 8px">Pace</th>' +
           '<th style="padding:5px 8px;width:80px"></th>' +
           '<th style="text-align:right;padding:5px 0">HR</th>' +
           '</tr>';
      validLaps.forEach(function(lap, i) {
        var ps = lap.pace ? paceToSecs(lap.pace) : null;
        var paceCol = ps && avgS ? (ps <= avgS ? 'var(--grn)' : ps <= avgS + 25 ? 'var(--org)' : 'var(--red)') : 'var(--t1)';
        var barW = ps ? Math.round(12 + 68 * (maxS2 - ps) / range2) : 12;
        if (barW < 4) barW = 4; if (barW > 80) barW = 80;
        var lapLabel = isInterval ? ('Rep ' + (i+1)) : ('km ' + lap.n);
        var timeStr = lap.time ? (Math.floor(lap.time/60) + ':' + (lap.time%60 < 10 ? '0' : '') + (lap.time%60)) : '–';
        h += '<tr style="border-top:1px solid var(--bdr2)">' +
             '<td style="padding:6px 8px 6px 0;color:var(--t3);font-size:11px">' + lapLabel + '</td>' +
             '<td style="padding:6px 8px;color:var(--t2)">' + lap.dist.toFixed(2) + ' km</td>' +
             '<td style="padding:6px 8px">' +
               '<span style="font-weight:700;color:' + paceCol + ';font-family:\'JetBrains Mono\',monospace;font-size:13px">' + (lap.pace || '–') + '</span>' +
               '<span style="color:var(--t3);font-size:10px"> /km</span>' +
               '<span style="color:var(--t3);font-size:10px;margin-left:8px">(' + timeStr + ')</span>' +
             '</td>' +
             '<td style="padding:6px 8px">' +
               '<div style="height:6px;border-radius:3px;width:' + barW + 'px;background:' + paceCol + ';opacity:.7"></div>' +
             '</td>' +
             '<td style="padding:6px 0;text-align:right;color:var(--t3);font-size:11px">' + (lap.hr ? Math.round(lap.hr) + ' bpm' : '') + '</td>' +
             '</tr>';
      });
      h += '</table>';
    } else {
      h += '<div style="padding:12px 0;font-size:12px;color:var(--t3)">No lap data available for this run</div>';
    }

    return h;
  }

  var filterType = 'all';
  var searchQ = '';

  function filteredRuns() {
    return allRuns.filter(function(r) {
      if (searchQ) {
        var q = searchQ.toLowerCase();
        if (r.title.toLowerCase().indexOf(q) < 0 && r.ds.indexOf(q) < 0) return false;
      }
      if (filterType === 'all') return true;
      var bc = badgeClass(r.title);
      if (filterType === 'easy') return bc === 'easy' || bc === 'moderate' || bc === 'steady' || bc === 'fast' || bc === 'recovery';
      if (filterType === 'tempo') return bc === 'tempo';
      if (filterType === 'intervals') return bc === 'intervals';
      if (filterType === 'long') return bc === 'long';
      if (filterType === 'race') return bc === 'race' || bc === 'parkrun';
      return true;
    });
  }

  function buildList() {
    var runs = filteredRuns();
    var listHtml = '';
    runs.forEach(function(r) {
      var bc = badgeClass(r.title);
      var bl = badgeLabel(r.title);
      var dObj = new Date(r.date);
      var dateStr = dObj.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
      listHtml += '<div class="rfi" data-runid="' + r.id + '">' +
        '<div class="rfi-row">' +
        '<span class="rfi-badge ' + bc + '">' + bl + '</span>' +
        '<span class="rfi-title">' + r.title + '</span>' +
        '<span class="rfi-date">' + dateStr + '</span>' +
        '<span class="rfi-dist">' + r.dist.toFixed(1) + ' km</span>' +
        '<span class="rfi-pace">' + (r.pace || '–') + '/km</span>' +
        '<span class="rfi-hr">' + (r.hr ? r.hr + ' ♥' : '') + '</span>' +
        '</div>' +
        '<div class="rfi-detail" id="rfi-det-' + r.id + '"></div>' +
        '</div>';
    });
    if (!listHtml) listHtml = '<div style="padding:40px;text-align:center;color:var(--t3)">No runs match</div>';
    document.getElementById('rf-list').innerHTML = listHtml;
    document.getElementById('rf-count').textContent = runs.length + ' runs';
  }

  // Build outer shell
  pg.innerHTML =
    '<div style="padding:20px 24px 0;display:flex;justify-content:space-between;align-items:baseline">' +
    '<h2 style="margin:0;font-size:20px;font-weight:700">All Runs</h2>' +
    '<span id="rf-count" class="rf-count"></span></div>' +
    '<div class="rf-controls">' +
    '<input class="rf-search" id="rf-search" type="text" placeholder="Search title or date…">' +
    '<div class="rf-filter">' +
    '<button class="rf-pill on" data-filter="all">All</button>' +
    '<button class="rf-pill" data-filter="easy">Easy</button>' +
    '<button class="rf-pill" data-filter="tempo">Tempo</button>' +
    '<button class="rf-pill" data-filter="intervals">Intervals</button>' +
    '<button class="rf-pill" data-filter="long">Long</button>' +
    '<button class="rf-pill" data-filter="race">Race</button>' +
    '</div></div>' +
    '<div id="rf-list"></div>';

  buildList();

  // Row click - expand/collapse detail (attached once, survives rebuilds via delegation on pg)
  document.getElementById('rf-list').addEventListener('click', function(e) {
    var row = e.target.closest('.rfi-row');
    if (!row) return;
    var item = row.closest('.rfi');
    if (!item) return;
    var runId = parseInt(item.dataset.runid);
    var wasOpen = item.classList.contains('open');
    document.querySelectorAll('.rfi.open').forEach(function(el) { el.classList.remove('open'); });
    if (!wasOpen) {
      item.classList.add('open');
      var det = document.getElementById('rfi-det-' + runId);
      if (det && !det.innerHTML) {
        var run = allRuns.filter(function(r) { return r.id === runId; })[0];
        if (run) det.innerHTML = renderDetail(run);
      }
    }
  });

  // Search
  document.getElementById('rf-search').addEventListener('input', function() {
    searchQ = this.value.trim();
    buildList();
  });

  // Filter pills
  pg.addEventListener('click', function(e) {
    var pill = e.target.closest('.rf-pill');
    if (!pill) return;
    filterType = pill.dataset.filter;
    pg.querySelectorAll('.rf-pill').forEach(function(p) { p.classList.toggle('on', p === pill); });
    buildList();
  });
}

// ===== MODALS =====
function showRepModal(selectedIds) {
  var modal = document.getElementById('rep-modal');
  var content = document.getElementById('rep-modal-content');

  if (!selectedIds || selectedIds.length < 2) {
    modal.classList.remove('show');
    return;
  }

  // Look up from ints array (selectedIds are ints indices, not allRuns IDs)
  var sessions = selectedIds.map(function(id) {
    return ints[id] || null;
  }).filter(Boolean);

  if (sessions.length < 2) return;

  // Build side-by-side rep comparison view
  var tabsHtml = '<div class="rep-tabs">' +
    '<button class="rep-tab active" data-reptab="sidebyside">Side by Side</button>';
  sessions.forEach(function(s, i) {
    var label = s.title.length > 25 ? s.title.substring(0,22) + '...' : s.title;
    tabsHtml += '<button class="rep-tab" data-reptab="session-' + i + '">' + label + '</button>';
  });
  tabsHtml += '</div>';

  // Side-by-side view: compare same rep across sessions
  var maxReps = Math.max.apply(null, sessions.map(function(s) { return s.repData ? s.repData.reps.length : 0; }));
  var sideBySideHtml = '<div class="rep-details show" data-rep-tab="sidebyside">';
  if (maxReps > 0) {
    sideBySideHtml += '<table class="run-splits-table"><tr><th>Rep</th>';
    sessions.forEach(function(s) {
      sideBySideHtml += '<th>' + s.title.substring(0,20) + '<br><span style="font-size:9px;opacity:.6">' + s.date + '</span></th>';
    });
    sideBySideHtml += '</tr>';

    for (var ri = 0; ri < maxReps; ri++) {
      // Find best (fastest) pace for this rep across sessions
      var repTimes = sessions.map(function(s) {
        return s.repData && s.repData.reps[ri] ? s.repData.reps[ri].timeSecs : 9999;
      });
      var bestTime = Math.min.apply(null, repTimes.filter(function(t){return t < 9999;}));

      sideBySideHtml += '<tr><td style="font-weight:700">R' + (ri+1) + '</td>';
      sessions.forEach(function(s, si) {
        var rep = s.repData && s.repData.reps[ri];
        if (rep) {
          var isBest = Math.abs(rep.timeSecs - bestTime) < 0.5;
          // For time-based reps, show distance; for distance-based, show time
          var repDisplay = rep.isTimeBased ? rep.distanceKm + 'km' : rep.time;
          sideBySideHtml += '<td class="' + (isBest ? 'bv' : '') + '" style="font-family:JetBrains Mono">' + repDisplay + ' <span style="font-size:10px;opacity:.6">(' + rep.pace + ')</span></td>';
        } else {
          sideBySideHtml += '<td> - </td>';
        }
      });
      sideBySideHtml += '</tr>';
    }

    // Summary row
    sideBySideHtml += '<tr style="border-top:2px solid var(--bdr);font-weight:700"><td>Avg</td>';
    sessions.forEach(function(s) {
      if (s.repData && s.repData.reps.length > 0) {
        var avgTime = s.repData.reps.reduce(function(sum,r){return sum+r.timeSecs},0) / s.repData.reps.length;
        var m = Math.floor(avgTime/60), sec = Math.round(avgTime%60);
        sideBySideHtml += '<td style="font-family:JetBrains Mono">' + m + ':' + (sec<10?'0':'') + sec + '</td>';
      } else {
        sideBySideHtml += '<td> - </td>';
      }
    });
    sideBySideHtml += '</tr></table>';
  } else {
    sideBySideHtml += '<p style="color:var(--t3)">No rep data available for these sessions</p>';
  }
  sideBySideHtml += '</div>';

  // Individual session detail views
  var sessionHtml = '';
  sessions.forEach(function(s, si) {
    var reps = s.repData ? s.repData.reps : [];
    sessionHtml += '<div class="rep-details" data-rep-tab="session-' + si + '">';

    if (reps.length > 0) {
      var isTimeInterval = reps[0].isTimeBased;
      var maxVal = isTimeInterval ?
        Math.max.apply(null, reps.map(function(r) { return parseFloat(r.distanceKm); })) :
        Math.max.apply(null, reps.map(function(r) { return r.timeSecs; }));

      reps.forEach(function(r, ri) {
        var barWidth = maxVal > 0 ? (isTimeInterval ? (parseFloat(r.distanceKm) / maxVal) * 100 : (r.timeSecs / maxVal) * 100) : 50;
        if (isTimeInterval) {
          var minDist = Math.min.apply(null, reps.map(function(x){return parseFloat(x.distanceKm);}));
          var maxDist = Math.max.apply(null, reps.map(function(x){return parseFloat(x.distanceKm);}));
          var isFastest = parseFloat(r.distanceKm) >= maxDist - 0.01;
          var isSlowest = parseFloat(r.distanceKm) <= minDist + 0.01;
        } else {
          var minTime = Math.min.apply(null, reps.map(function(x){return x.timeSecs;}));
          var maxTime = Math.max.apply(null, reps.map(function(x){return x.timeSecs;}));
          var isFastest = r.timeSecs <= minTime + 0.5;
          var isSlowest = r.timeSecs >= maxTime - 0.5;
        }
        // For time-based reps, show distance; for distance-based, show time
        var repDisplay = isTimeInterval ? r.distanceKm + 'km' : r.time;
        sessionHtml += '<div class="rep-row">' +
          '<div class="rep-num">R' + (ri+1) + '</div>' +
          '<div class="rep-bar-wrap"><div class="rep-bar" style="width:' + barWidth + '%;background:' + (isFastest ? 'var(--grn)' : isSlowest ? 'var(--org)' : 'var(--grd1)') + '"></div></div>' +
          '<div class="rep-time">' + repDisplay + '</div>' +
          '<div class="rep-pace">' + r.pace + '</div>' +
          '</div>';
      });

      if (isTimeInterval) {
        var dists = reps.map(function(r) { return parseFloat(r.distanceKm); });
        var maxDist = Math.max.apply(null, dists);
        var minDist = Math.min.apply(null, dists);
        var avgDist = dists.reduce(function(a,b){return a+b},0) / dists.length;
        sessionHtml += '<div class="rep-summary">' +
          '<div class="rep-summary-item"><strong>Max distance:</strong> <span class="mono">' + maxDist.toFixed(2) + 'km</span></div>' +
          '<div class="rep-summary-item"><strong>Min distance:</strong> <span class="mono">' + minDist.toFixed(2) + 'km</span></div>' +
          '<div class="rep-summary-item"><strong>Spread:</strong> <span class="mono">' + (maxDist - minDist).toFixed(2) + 'km</span></div>' +
          '<div class="rep-summary-item"><strong>Avg rep:</strong> <span class="mono">' + avgDist.toFixed(2) + 'km</span></div>' +
          '</div>';
      } else {
        var times = reps.map(function(r) { return r.timeSecs; });
        var fastest = Math.min.apply(null, times);
        var slowest = Math.max.apply(null, times);
        var avg = times.reduce(function(a,b){return a+b},0) / times.length;
        var fmtT = function(s) { var m=Math.floor(s/60),sc=Math.round(s%60); return m+':'+(sc<10?'0':'')+sc; };
        sessionHtml += '<div class="rep-summary">' +
          '<div class="rep-summary-item"><strong>Fastest:</strong> <span class="mono">' + fmtT(fastest) + '</span></div>' +
          '<div class="rep-summary-item"><strong>Slowest:</strong> <span class="mono">' + fmtT(slowest) + '</span></div>' +
          '<div class="rep-summary-item"><strong>Spread:</strong> <span class="mono">' + fmtT(slowest - fastest) + '</span></div>' +
          '<div class="rep-summary-item"><strong>Avg rep:</strong> <span class="mono">' + fmtT(avg) + '</span></div>' +
          '</div>';
      }
    } else {
      sessionHtml += '<p style="color:var(--t3)">No rep data for this session</p>';
    }
    sessionHtml += '</div>';
  });

  content.innerHTML = tabsHtml + sideBySideHtml + sessionHtml;
  var repLabel = sessions[0].repInfo ? sessions[0].repInfo.label : sessions[0].title;
  document.getElementById('rep-modal-title').textContent = 'Rep Comparison - ' + repLabel;
  modal.classList.add('show');

  // Wire up tab switching within modal
  content.querySelectorAll('.rep-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      content.querySelectorAll('.rep-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      content.querySelectorAll('.rep-details').forEach(function(d) { d.classList.remove('show'); });
      var target = content.querySelector('[data-rep-tab="' + tab.dataset.reptab + '"]');
      if (target) target.classList.add('show');
    });
  });
}

window.switchRepTab = function(tabIndex) {
  document.querySelectorAll('.rep-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === tabIndex);
  });
  document.querySelectorAll('.rep-details').forEach(function(d, i) {
    d.classList.toggle('show', i === tabIndex);
  });
};

window.toggleRunAcc = function(btn) {
  var body = btn.nextElementSibling;
  var chevron = btn.querySelector('.run-acc-chevron');
  var isCollapsed = body.classList.contains('collapsed');
  if (isCollapsed) {
    body.style.maxHeight = body.scrollHeight + 'px';
    body.classList.remove('collapsed');
    chevron.style.transform = 'rotate(90deg)';
  } else {
    body.style.maxHeight = '0';
    body.classList.add('collapsed');
    chevron.style.transform = '';
  }
};

function showRunDetailsModal(runId) {
  var run = null;
  for (var i = 0; i < allRuns.length; i++) {
    if (allRuns[i].id === runId) { run = allRuns[i]; break; }
  }
  if (!run) return;

  var modal = document.getElementById('run-details-modal');
  var content = document.getElementById('run-details-content');

  // Classify run type colour
  var typeClass = '';
  var t = run.title.toLowerCase();
  if (t.indexOf('race') >= 0 || t.indexOf('parkrun') >= 0) typeClass = 'color:var(--org)';
  else if (t.indexOf('interval') >= 0) typeClass = 'color:var(--blu)';
  else if (t.indexOf('tempo') >= 0 || t.indexOf('threshold') >= 0) typeClass = 'color:var(--prp)';
  else if (t.indexOf('long') >= 0) typeClass = 'color:var(--red)';
  else typeClass = 'color:var(--grn)';

  // Helper: build one accordion section
  function accSec(title, bodyHtml, isOpen) {
    var collapsed = isOpen ? '' : ' collapsed';
    var maxH     = isOpen ? 'max-height:600px' : 'max-height:0';
    var chevRot  = isOpen ? ' style="transform:rotate(90deg)"' : '';
    return '<div class="run-detail-section">' +
      '<button class="run-acc-toggle" onclick="toggleRunAcc(this)">' +
        '<span class="run-section-h">' + title + '</span>' +
        '<span class="run-acc-chevron"' + chevRot + '>\u203a</span>' +
      '</button>' +
      '<div class="run-acc-body' + collapsed + '" style="' + maxH + '">' +
        bodyHtml +
      '</div>' +
    '</div>';
  }

  // ── Overview (open by default) ────────────────────────────────────────────────────────────────────
  var overviewBody =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<span style="font-size:12px;font-weight:700;' + typeClass + '">' + run.title + '</span>' +
      '<span style="font-size:11px;color:var(--t3)">' +
        new Date(run.date).toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) +
      '</span>' +
    '</div>' +
    '<div class="run-stat-grid">' +
      '<div class="run-stat"><div class="run-stat-label">Distance</div><div class="run-stat-value">' + run.dist.toFixed(2) + ' km</div></div>' +
      '<div class="run-stat"><div class="run-stat-label">Time</div><div class="run-stat-value">' + run.time + '</div></div>' +
      '<div class="run-stat"><div class="run-stat-label">Avg Pace</div><div class="run-stat-value">' + run.pace + '/km</div></div>' +
      '<div class="run-stat"><div class="run-stat-label">Best Pace</div><div class="run-stat-value">' + (run.bestPace || ' - ') + '/km</div></div>' +
      '<div class="run-stat"><div class="run-stat-label">Avg HR</div><div class="run-stat-value">' + (run.hr || ' - ') + (run.hr ? ' bpm' : '') + '</div></div>' +
      '<div class="run-stat"><div class="run-stat-label">Max HR</div><div class="run-stat-value">' + (run.mhr || ' - ') + (run.mhr ? ' bpm' : '') + '</div></div>' +
    '</div>';
  var html = accSec('Overview', overviewBody, true);

  // ── Running Form ─────────────────────────────────────────────────────────────────────────────────
  if (run.cad || run.stride || run.gct || run.pw) {
    var formBody = '<div class="run-stat-grid">';
    if (run.cad)    formBody += '<div class="run-stat"><div class="run-stat-label">Cadence</div><div class="run-stat-value">' + run.cad + ' spm</div></div>';
    if (run.stride) formBody += '<div class="run-stat"><div class="run-stat-label">Stride</div><div class="run-stat-value">' + run.stride + ' m</div></div>';
    if (run.gct)    formBody += '<div class="run-stat"><div class="run-stat-label">GCT</div><div class="run-stat-value">' + run.gct + ' ms</div></div>';
    if (run.pw)     formBody += '<div class="run-stat"><div class="run-stat-label">Power</div><div class="run-stat-value">' + run.pw + ' W</div></div>';
    formBody += '</div>';
    html += accSec('Running Form', formBody, false);
  }

  // ── Elevation ─────────────────────────────────────────────────────────────────────────────────────────────
  if (run.ascent) {
    var elevBody = '<div class="run-stat-grid">' +
      '<div class="run-stat"><div class="run-stat-label">Ascent</div><div class="run-stat-value">' + run.ascent + ' m</div></div>' +
      '</div>';
    html += accSec('Elevation', elevBody, false);
  }

  // ── Training Load ───────────────────────────────────────────────────────────────────────────────────
  var loadItems = [];
  if (run.te) loadItems.push({l:'Training Effect', v: run.te});
  if (run.tss) loadItems.push({l:'TSS', v: Math.round(run.tss)});
  if (run.np) loadItems.push({l:'Norm. Power', v: run.np + ' W'});
  if (run.bodyBattery != null && run.bodyBattery !== 0) {
    loadItems.push({l:'Body Battery', v: run.bodyBattery < 0 ? run.bodyBattery : '+' + run.bodyBattery});
  }
  if (loadItems.length) {
    var loadBody = '<div class="run-stat-grid">';
    loadItems.forEach(function(e) {
      loadBody += '<div class="run-stat"><div class="run-stat-label">' + e.l + '</div><div class="run-stat-value">' + e.v + '</div></div>';
    });
    loadBody += '</div>';
    html += accSec('Training Load', loadBody, false);
  }

  // ── Timing ───────────────────────────────────────────────────────────────────────────────────────────────
  if (run.movingTimeSecs && run.elapsedTimeSecs) {
    var pauseSecs = Math.round(run.elapsedTimeSecs - run.movingTimeSecs);
    if (pauseSecs > 30) {
      var pauseMin = Math.floor(pauseSecs / 60), pauseSec = pauseSecs % 60;
      var pauseStr = pauseMin > 0 ? pauseMin + 'm ' + pauseSec + 's' : pauseSec + 's';
      var timingBody = '<div class="run-stat-grid">' +
        '<div class="run-stat"><div class="run-stat-label">Moving Time</div><div class="run-stat-value">' + secsToTime(run.movingTimeSecs) + '</div></div>' +
        '<div class="run-stat"><div class="run-stat-label">Elapsed Time</div><div class="run-stat-value">' + secsToTime(run.elapsedTimeSecs) + '</div></div>' +
        '<div class="run-stat"><div class="run-stat-label">Paused</div><div class="run-stat-value" style="color:var(--t3)">' + pauseStr + '</div></div>' +
        '</div>';
      html += accSec('Timing', timingBody, false);
    }
  }

  // ── Additional ──────────────────────────────────────────────────────────────────────────────────────────
  var extras = [];
  if (run.cals) extras.push({l:'Calories', v: run.cals + ' kcal'});
  if (run.steps) extras.push({l:'Steps', v: run.steps.toLocaleString()});
  if (run.numLaps && run.numLaps > 1) extras.push({l:'Laps', v: run.numLaps});
  if (run.tempMin != null && run.tempMax != null) extras.push({l:'Temperature', v: run.tempMin + '\u2013' + run.tempMax + '\u00b0C'});
  if (extras.length) {
    var extBody = '<div class="run-stat-grid">';
    extras.forEach(function(e) {
      extBody += '<div class="run-stat"><div class="run-stat-label">' + e.l + '</div><div class="run-stat-value">' + e.v + '</div></div>';
    });
    extBody += '</div>';
    html += accSec('Additional', extBody, false);
  }

  content.innerHTML = html;
  document.getElementById('run-details-title').textContent = run.title;
  modal.classList.add('show');
}

// ===== DRAG & DROP CSV =====
var dz = document.getElementById('drop-zone');
var dragCounter = 0;
document.addEventListener('dragenter', function(e) {
  e.preventDefault();
  dragCounter++;
  dz.classList.add('show');
});
document.addEventListener('dragleave', function(e) {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) { dz.classList.remove('show'); dragCounter = 0; }
});
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  e.preventDefault();
  dz.classList.remove('show');
  dragCounter = 0;
  var files = e.dataTransfer.files;
  if (files.length && files[0].name.endsWith('.csv')) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      // Store in sessionStorage and reload to apply
      try {
        sessionStorage.setItem('garmin_csv', ev.target.result);
        window.location.reload();
      } catch(err) {
        alert('CSV loaded but too large for sessionStorage. Copy the CSV content into the CSV_DATA variable in the source code.');
      }
    };
    reader.readAsText(files[0]);
  }
});

// ===== ANIMATED COUNTERS =====
setTimeout(function() {
  var els = document.querySelectorAll('.anim-num');
  els.forEach(function(el) {
    var target = parseFloat(el.dataset.target);
    if (isNaN(target)) return;
    var hasDec = el.dataset.dec === '1';
    var duration = 1400;
    var start = performance.now();
    el.textContent = '0';
    function tick(now) {
      var elapsed = now - start;
      var progress = Math.min(elapsed / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var val = eased * target;
      el.textContent = hasDec ? val.toFixed(1) : Math.round(val).toLocaleString();
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}, 100);

})();

// ===== WEEKLY VOLUME HOVER TOOLTIP =====
(function() {
  var tip = document.getElementById('vol-tip');
  if (!tip) return;
  var chart = document.getElementById('vol-wk-chart');
  if (!chart) return;
  chart.addEventListener('mouseover', function(e) {
    var g = e.target.closest('g[data-k]');
    if (!g) return;
    tip.textContent = g.dataset.info;
    tip.classList.add('show');
  });
  chart.addEventListener('mousemove', function(e) {
    var tipW = tip.offsetWidth || 180;
    var left = e.clientX + 16;
    if (left + tipW > window.innerWidth - 8) left = e.clientX - tipW - 16;
    tip.style.left = left + 'px';
    tip.style.top  = (e.clientY - 44) + 'px';
  });
  chart.addEventListener('mouseleave', function() {
    tip.classList.remove('show');
  });
})();
